name = "monex-api"
main = "src/index.js"
compatibility_date = "2025-08-15"
compatibility_flags = ["nodejs_compat", "enable_nodejs_http_modules"]

# Optional but helps CI: paste Account ID from Cloudflare → Workers & Pages sidebar
# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

[[kv_namespaces]]
binding = "MONEX_KV"
id = "0f9974ccc16143aa825372bd3bed7f1b"

[vars]
BOT_USERNAME = "monexmonad"
STARTING_MONBALLS = "10"
ENABLE_X_POLL = "1"
# Set to 1 so @monexmonad replies to valid catch tweets (requires X app Read+Write).
# wrangler deploy overwrites dashboard plaintext vars — keep this in sync.
ENABLE_X_REPLY = "1"
# Max @monexmonad reply tweets per X user per UTC day (catch still logs after limit).
DAILY_REPLY_LIMIT = "4"
# Project owner dev exception (all other users stay at DAILY_REPLY_LIMIT).
REPLY_LIMIT_OVERRIDES = "jericddd:100"
# Set to 1 for Cloudflare Workers AI replies (falls back to natural templates if unavailable).
ENABLE_AI_REPLY = "0"
# Optional model override, e.g. @cf/meta/llama-3.1-8b-instruct
# AI_REPLY_MODEL = "@cf/meta/llama-3.1-8b-instruct"
# Production: keep global dev login, simulate, and admin reset OFF.
ENABLE_DEV_AUTH = "0"
# Staging-only dev login. MUST stay "0" on the production Worker: the Origin
# header can be spoofed by non-browser clients and anyone can host a *.pages.dev
# site, so an Origin-only gate is not a real auth boundary. Enable only on a
# dedicated staging Worker deployment.
ENABLE_STAGING_DEV_AUTH = "0"
ENABLE_SIMULATE = "0"
ENABLE_ADMIN_RESET = "0"
DEPLOY_ENV = "production"
# Worker public URL — must match OAuth callback host in X Developer Portal.
WORKER_ORIGIN = "https://monex-api.0xjericd.workers.dev"
# Live site (custom domain). OAuth redirects return here after X login.
FRONTEND_ORIGIN = "https://monexmonad.xyz"
# MonBall package catalog (optional JSON override). Default: 10/50/100 packs.
# MONBALL_PACKAGES_JSON = '[{"id":"mb_10","amount":10,"monexPrice":10000,"active":true,"displayOrder":1},{"id":"mb_50","amount":50,"monexPrice":50000,"active":true,"displayOrder":2},{"id":"mb_100","amount":100,"monexPrice":100000,"active":true,"displayOrder":3}]'
# Set to 1 only on staging to grant packages without on-chain $MONEX settlement.
# ENABLE_MONBALL_PACKAGE_PURCHASE = "0"
# ENABLE_GOLD_PACKAGE_PURCHASE = "0"
# $MONEX vault payments (Monad mainnet). Override only if rotating addresses.
MONAD_CHAIN_ID = "143"
MONEX_TOKEN_ADDRESS = "0x978Ae7298D48Cf0f8d1fdB26abC12bfACFcC7777"
MONEX_VAULT_ADDRESS = "0x6C24509a1fD993C5372620923223a69Fd17AA2F2"
MONEX_TOKEN_DECIMALS = "18"
MONAD_RPC_URL = "https://rpc.monad.xyz"
MONAD_EXPLORER_TX_URL = "https://monadvision.com/tx/"
MONEX_PAYMENT_MIN_CONFIRMATIONS = "1"

# Workers AI binding (set ENABLE_AI_REPLY=1 to use)
[ai]
binding = "AI"

# Poll mentions every 30 min while testing (change to */2 * * * * for production).
crons = ["*/30 * * * *"]
