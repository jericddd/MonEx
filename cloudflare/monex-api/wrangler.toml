name = "monex-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Optional but helps CI: paste Account ID from Cloudflare → Workers & Pages sidebar
# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

[[kv_namespaces]]
binding = "MONEX_KV"
id = "0f9974ccc16143aa825372bd3bed7f1b"

[vars]
BOT_USERNAME = "monexmonad"
STARTING_MONBALLS = "10"
ENABLE_X_POLL = "0"
ENABLE_DEV_AUTH = "1"
# TEST PHASE ONLY — set ENABLE_ADMIN_RESET=0 and delete ADMIN_RESET_SECRET before go-live
ENABLE_ADMIN_RESET = "1"
# After deploy, set secrets: X_CLIENT_ID, X_CLIENT_SECRET
# Live site (custom domain). OAuth redirects return here after X login.
FRONTEND_ORIGIN = "https://monexmonad.xyz"

# Optional: live X mentions every 2 minutes (set ENABLE_X_POLL=1 + API secrets)
[triggers]
crons = ["*/2 * * * *"]
