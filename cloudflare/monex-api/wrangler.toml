name = "monex-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "MONEX_KV"
id = "REPLACE_WITH_KV_ID"

[vars]
BOT_USERNAME = "monexmonad"
STARTING_MONBALLS = "10"
ENABLE_X_POLL = "0"

# Optional: live X mentions every 2 minutes (set ENABLE_X_POLL=1 + API secrets)
[triggers]
crons = ["*/2 * * * *"]
