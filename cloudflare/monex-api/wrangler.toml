name = "monex-api"
main = "src/index.js"
compatibility_date = "2025-08-15"
compatibility_flags = ["nodejs_compat", "enable_nodejs_http_modules"]

# Optional but helps CI: paste Account ID from Cloudflare → Workers & Pages sidebar
# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

[[kv_namespaces]]
binding = "MONEX_KV"
id = "0f9974ccc16143aa825372bd3bed7f1b"

[vars]
BOT_USERNAME = "monexmonad"
STARTING_MONBALLS = "10"
ENABLE_X_POLL = "1"
# Set to 1 so @monexmonad replies to valid catch tweets (requires X app Read+Write).
ENABLE_X_REPLY = "0"
# Max @monexmonad reply tweets per X user per UTC day (catch still logs after limit).
DAILY_REPLY_LIMIT = "4"
# Set to 1 for Cloudflare Workers AI replies (falls back to natural templates if unavailable).
ENABLE_AI_REPLY = "0"
# Optional model override, e.g. @cf/meta/llama-3.1-8b-instruct
# AI_REPLY_MODEL = "@cf/meta/llama-3.1-8b-instruct"
# Production: keep dev login, simulate, and admin reset OFF. Enable only on staging/local.
ENABLE_DEV_AUTH = "0"
ENABLE_SIMULATE = "0"
ENABLE_ADMIN_RESET = "0"
# Worker public URL — must match OAuth callback host in X Developer Portal.
WORKER_ORIGIN = "https://monex-api.0xjericd.workers.dev"
# Live site (custom domain). OAuth redirects return here after X login.
FRONTEND_ORIGIN = "https://monexmonad.xyz"

# Workers AI binding (set ENABLE_AI_REPLY=1 to use)
[ai]
binding = "AI"

# Poll mentions every 30 min while testing (change to */2 * * * * for production).
crons = ["*/30 * * * *"]
