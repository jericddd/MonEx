name = "monex-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "MONEX_KV"
id = "0f9974ccc16143aa825372bd3bed7f1b"

[vars]
BOT_USERNAME = "monexmonad"
STARTING_MONBALLS = "10"
ENABLE_X_POLL = "0"
ENABLE_DEV_AUTH = "1"
# After deploy, set secrets: X_CLIENT_ID, X_CLIENT_SECRET
# Optional vars: FRONTEND_ORIGIN, X_REDIRECT_URI, WORKER_ORIGIN
# FRONTEND_ORIGIN = "https://jericddd.github.io/MonEx"

# Optional: live X mentions every 2 minutes (set ENABLE_X_POLL=1 + API secrets)
[triggers]
crons = ["*/2 * * * *"]
