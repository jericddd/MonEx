name: Compensate campaign c1 monballs

# Grant missing 15 Monballs for Reach Chapter 1 Stage 10 when claimed but unpaid.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview eligibility only (no KV writes)"
        type: boolean
        default: true
      username:
        description: "Reported X username without @"
        required: true
      confirm:
        description: "Type PREVIEW to dry-run, or COMPENSATE to apply"
        required: true

permissions:
  contents: read

jobs:
  compensate:
    runs-on: ubuntu-latest
    name: Compensate missing campaign c1 monballs
    steps:
      - name: Confirm action
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ] && [ "${{ inputs.confirm }}" != "PREVIEW" ]; then
            echo "::error::Dry-run requires confirm = PREVIEW"
            exit 1
          fi
          if [ "${{ inputs.dry_run }}" != "true" ] && [ "${{ inputs.confirm }}" != "COMPENSATE" ]; then
            echo "::error::Apply requires confirm = COMPENSATE"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Compensate campaign c1 monballs
        working-directory: cloudflare/monex-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          ARGS+=("${{ inputs.username }}")
          node scripts/compensate-campaign-c1-monball.mjs "${ARGS[@]}"
