name: Backfill quest rewards

# Deliver missing quest/milestone rewards via in-game Mailbox.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no KV writes)"
        type: boolean
        default: true
      username:
        description: "Optional X username without @ (omit to scan all saves)"
        required: false
      confirm:
        description: "Type PREVIEW to dry-run, or BACKFILL to apply"
        required: true

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    name: Backfill quest rewards to mailbox
    steps:
      - name: Confirm action
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ] && [ "${{ inputs.confirm }}" != "PREVIEW" ]; then
            echo "::error::Dry-run requires confirm = PREVIEW"
            exit 1
          fi
          if [ "${{ inputs.dry_run }}" != "true" ] && [ "${{ inputs.confirm }}" != "BACKFILL" ]; then
            echo "::error::Apply requires confirm = BACKFILL"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Backfill quest rewards
        working-directory: cloudflare/monex-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ -n "${{ inputs.username }}" ]; then
            ARGS+=("${{ inputs.username }}")
          fi
          node scripts/backfill-quest-rewards.mjs "${ARGS[@]}"
