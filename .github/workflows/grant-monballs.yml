name: Grant Monballs

# Adds Monballs to a user's catch API balance and cloud save (production KV).
on:
  workflow_dispatch:
    inputs:
      username:
        description: "X username (without @)"
        required: true
      amount:
        description: "Monballs to add"
        required: true
        default: "100"
      confirm:
        description: "Type GRANT to confirm"
        required: true

permissions:
  contents: read

jobs:
  grant:
    if: inputs.confirm == 'GRANT'
    runs-on: ubuntu-latest
    name: Grant Monballs in production KV
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Grant Monballs
        working-directory: cloudflare/monex-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/grant-monballs.mjs "${{ inputs.username }}" "${{ inputs.amount }}"
