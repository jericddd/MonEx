name: Recover activity catches

# Rebuild missing in-game mons from X Wild Log when pending queue is already empty.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no KV writes)"
        type: boolean
        default: true
      username:
        description: "X username without @ — case-sensitive (e.g. Lucci_Crypto)"
        required: true
      spend:
        description: "Optional — recover only this catch size (e.g. 18 for Catch 18). Leave empty for all sessions."
        required: false
        default: ""
      confirm:
        description: "Type PREVIEW to dry-run, or RECOVER to apply"
        required: true

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    name: Recover catches from X Wild Log
    steps:
      - name: Confirm action
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ] && [ "${{ inputs.confirm }}" != "PREVIEW" ]; then
            echo "::error::Dry-run requires confirm = PREVIEW"
            exit 1
          fi
          if [ "${{ inputs.dry_run }}" != "true" ] && [ "${{ inputs.confirm }}" != "RECOVER" ]; then
            echo "::error::Apply requires confirm = RECOVER"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Recover activity catches
        working-directory: cloudflare/monex-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ -n "${{ inputs.spend }}" ]; then
            ARGS+=(--spend "${{ inputs.spend }}")
          fi
          node scripts/recover-activity-catches.mjs "${ARGS[@]}" "${{ inputs.username }}"
