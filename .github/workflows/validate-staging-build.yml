name: Validate Staging Build

# Checks the staging site bundle builds correctly (no Cloudflare token needed).
# Actual staging deploy: Cloudflare Pages connected to GitHub (see docs/staging-workflow.html).
on:
  pull_request:
    branches: [main]
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate staging site bundle
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: cloudflare/monex-api/package-lock.json

      - name: Install API deps
        working-directory: cloudflare/monex-api
        run: npm ci

      - name: Run API + client tests
        working-directory: cloudflare/monex-api
        run: npm test

      - name: Prepare static site
        run: bash scripts/prepare-staging-site.sh

      - name: Verify bundle
        run: |
          test -f staging-dist/index.html
          test -f staging-dist/home.html
          test -f staging-dist/play/index.html
          test -f staging-dist/monanimal_game.html
          grep -q MARKETPLACE staging-dist/index.html
          grep -q showcase-panel-body staging-dist/index.html
          grep -q monex_game_entry staging-dist/play/index.html
          test ! -f staging-dist/CNAME
          test -f staging-dist/js/staging-banner.js
          echo "Staging bundle OK — ready for Cloudflare Pages"
