name: Reset production data

# Wipes all cloud saves, X wild log, sessions, and bumps client reset epoch.
# Requires GitHub secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type RESET to wipe all users, saves, gear, and X wild log on main"
        required: true

jobs:
  reset-production:
    if: inputs.confirm == 'RESET'
    runs-on: ubuntu-latest
    name: Wipe KV and deploy API
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare/monex-api/package-lock.json

      - name: Install dependencies
        working-directory: cloudflare/monex-api
        run: npm ci

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wipe all production KV data
        working-directory: cloudflare/monex-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/reset-production-kv.mjs

      - name: Deploy Cloudflare API
        working-directory: cloudflare/monex-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
