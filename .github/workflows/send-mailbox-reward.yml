name: Send mailbox reward

# Deliver a custom reward mail to one user or all cloud saves.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no KV writes)"
        type: boolean
        default: true
      username:
        description: "X username without @ (leave empty to send to all users)"
        required: false
      title:
        description: "Mail title shown in Mailbox"
        required: true
      resource:
        description: "Reward resource"
        type: choice
        options:
          - gold
          - kbs_onion
          - monball
        required: true
      quantity:
        description: "Amount to grant when the user claims the mail"
        required: true
        default: "1"
      confirm:
        description: "Type PREVIEW to dry-run, or SEND to apply"
        required: true

permissions:
  contents: read

jobs:
  send-mail:
    runs-on: ubuntu-latest
    name: Send mailbox reward mail
    steps:
      - name: Confirm action
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ] && [ "${{ inputs.confirm }}" != "PREVIEW" ]; then
            echo "::error::Dry-run requires confirm = PREVIEW"
            exit 1
          fi
          if [ "${{ inputs.dry_run }}" != "true" ] && [ "${{ inputs.confirm }}" != "SEND" ]; then
            echo "::error::Apply requires confirm = SEND"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Send mailbox reward
        working-directory: cloudflare/monex-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ARGS=(
            --title "${{ inputs.title }}"
            --resource "${{ inputs.resource }}"
            --quantity "${{ inputs.quantity }}"
          )
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ -n "${{ inputs.username }}" ]; then
            ARGS+=("${{ inputs.username }}")
          fi
          node scripts/send-mailbox-reward.mjs "${ARGS[@]}"
