name: Reconcile battle progress

on:
  workflow_dispatch:
    inputs:
      username:
        description: "X username (without @)"
        required: true
      dry_run:
        description: "Preview only"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      confirm:
        description: "Type REPAIR to apply (ignored when dry_run=true)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    name: Reconcile battle rewards
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run battle progress reconcile
        working-directory: cloudflare/monex-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ARGS="--username ${{ inputs.username }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          elif [ "${{ inputs.confirm }}" = "REPAIR" ]; then
            ARGS="$ARGS --confirm REPAIR"
          else
            echo "::error::Set confirm=REPAIR when dry_run=false"
            exit 1
          fi
          node scripts/reconcile-battle-progress.mjs $ARGS
