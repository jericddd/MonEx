<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MonEx - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
    body {
        margin: 0;
        font-family: 'Lato', system-ui, sans-serif;
        background: url('for%20result%20banner/homebg.jpg') no-repeat center center fixed;
        background-size: cover;
        color: #111;
        min-height: 100vh;
    }

    .header {
    background: transparent;
    padding: 12px 0;
    border-bottom: none;
}
    .header-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
    }

    .nav-btn {
        padding: 8px 16px;
        margin: 4px 2px;
        border: 2px solid #6B21A8;
        background: white;
        color: #111;
        font-weight: 700;
        cursor: pointer;
        font-family: "Press Start 2P", sans-serif;
        font-size: 11px;
        transition: all 0.3s ease;
        white-space: nowrap;
    }
    .nav-btn:hover {
        background: #6B21A8;
        color: white;
        transform: translateY(-4px) scale(1.05);
    }

    .main-container {
        max-width: 1200px;
        margin: 20px auto 0;
        padding: 20px 15px;
        display: flex;
        gap: 15px;
        background: rgba(0, 0, 0, 0.45);
        border-radius: 8px 8px 0 0;
        flex-wrap: wrap;
    }

    .home-wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 15px 24px;
    }

    /* Left Sidebar */
    .left-sidebar {
        width: 100%;
        max-width: 240px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .sidebar-btn {
        padding: 16px;
        background: white;
        border: 4px solid #6B21A8;
        box-shadow: 4px 4px 0px #6B21A8;
        font-family: "Press Start 2P", sans-serif;
        font-size: 14px;
        text-align: center;
        cursor: pointer;
        transition: all 0.4s ease;
    }
    .sidebar-btn:hover {
        background: #6B21A8;
        color: white;
        transform: translateX(8px) scale(1.03);
    }

    /* Central Banner */
    .central-banner {
        flex: 1;
        min-width: 280px;
        background: rgba(255,255,255,0.92);
        border: 4px solid #6B21A8;
        box-shadow: 4px 4px 0px #6B21A8;
        padding: 20px;
        text-align: center;
    }

    /* Right Sidebar */
    .right-sidebar {
        width: 100%;
        max-width: 260px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .side-box {
        background: white;
        border: 4px solid #6B21A8;
        box-shadow: 4px 4px 0px #6B21A8;
        padding: 15px;
        transition: all 0.3s ease;
    }
    .side-box:hover {
        transform: translateY(-5px);
    }

    h2 {
        font-family: "Press Start 2P", monospace;
        color: #6B21A8;
    }

    /* Mobile Responsive */
    @media (max-width: 900px) {
        .main-container {
            flex-direction: column;
            align-items: center;
        }
        .left-sidebar, .right-sidebar {
            max-width: 100%;
        }
        .nav-btn {
            font-size: 10px;
            padding: 8px 12px;
        }
    }

    .activity-live {
        display: inline-block;
        width: 8px; height: 8px;
        background: #22c55e;
        border-radius: 50%;
        animation: blink 1.5s infinite;
        margin-right: 6px;
    }

    /* Full-width X Wild Log — spans all 3 columns */
    .wild-log-section {
        max-width: 1200px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.96);
        border: 4px solid #6B21A8;
        border-top: none;
        box-shadow: 4px 4px 0px #6B21A8;
        padding: 16px 18px 14px;
        border-radius: 0 0 8px 8px;
    }
    .wild-log-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
        border-bottom: 2px solid #e9d5ff;
        padding-bottom: 10px;
    }
    .wild-log-header h2 {
        margin: 0;
        font-size: 13px;
    }
    .wild-log-sub {
        font-size: 11px;
        color: #666;
        margin: 0;
    }
    .wild-log-table-wrap {
        overflow-x: auto;
        min-height: 120px;
    }
    .wild-log-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
        text-align: left;
    }
    .wild-log-table th {
        font-family: "Press Start 2P", monospace;
        font-size: 8px;
        color: #6B21A8;
        padding: 8px 10px;
        border-bottom: 2px solid #6B21A8;
        white-space: nowrap;
        background: #faf5ff;
    }
    .wild-log-table td {
        padding: 9px 10px;
        border-bottom: 1px solid #ede9fe;
        vertical-align: top;
    }
    .wild-log-table tr:hover td {
        background: #faf5ff;
    }
    .col-num { width: 36px; color: #888; font-size: 10px; }
    .col-time { white-space: nowrap; font-size: 10px; color: #444; }
    .col-user { white-space: nowrap; }
    .col-spend, .col-throws, .col-left { text-align: center; white-space: nowrap; }
    .col-mons { min-width: 140px; line-height: 1.4; }
    .activity-user { color: #6B21A8; font-weight: 700; }
    .activity-rare { color: #2563eb; font-weight: 700; }
    .wild-log-empty {
        color: #888;
        font-size: 12px;
        text-align: center;
        padding: 24px 12px;
        margin: 0;
    }
    .wild-log-pagination {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 14px;
        padding-top: 12px;
        border-top: 2px solid #e9d5ff;
    }
    .page-btn, .page-nav {
        font-family: "Press Start 2P", monospace;
        font-size: 9px;
        padding: 6px 10px;
        border: 2px solid #6B21A8;
        background: white;
        color: #6B21A8;
        cursor: pointer;
    }
    .page-btn:hover, .page-nav:hover:not(:disabled) {
        background: #6B21A8;
        color: white;
    }
    .page-btn.active {
        background: #6B21A8;
        color: white;
    }
    .page-nav:disabled {
        opacity: 0.35;
        cursor: not-allowed;
    }
    .page-ellipsis {
        font-size: 12px;
        color: #888;
        padding: 0 4px;
    }
    .page-info {
        font-size: 10px;
        color: #666;
        margin-left: 8px;
        width: 100%;
        text-align: center;
    }
    @media (min-width: 901px) {
        .page-info { width: auto; text-align: left; }
    }
    @media (max-width: 600px) {
        .header-inner {
            flex-direction: column;
            gap: 10px;
        }
    }
    @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}
</style>
</head>
<body>

<!-- Header - Transparent -->
<div class="header" style="background: transparent; border-bottom: none;">
    <div class="header-inner">
    <img src="logo.png" alt="MonEx Logo" style="height: 45px; margin-top: 5px;">
    <div id="nav-buttons" class="nav-buttons"></div>
</div>
</div>

<div class="home-wrap">

<div class="main-container">
    
<!-- Left Sidebar -->
<div class="left-sidebar">
    <div class="sidebar-btn" onclick="handleGameStart()" 
     style="background: linear-gradient(145deg, #c084fc, #7c3aed); 
            color: white; 
            font-size: 15px; 
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.9), 
                        inset 0 6px 15px rgba(255,255,255,0.5); 
            text-shadow: 0 2px 4px rgba(0,0,0,0.4); 
            border: 4px solid #6B21A8;">
    GAME START
</div>
    
    <div class="sidebar-btn" onclick="window.location.href='docs.html'">DOCS</div>
    
    <div class="sidebar-btn" onclick="window.location.href='monanimal_game.html'">SHOP</div>

    <!-- Monanimal Showcase - Below Shop -->
<div style="margin-top: 15px; background: white; border: 4px solid #6B21A8; box-shadow: 4px 4px 0px #6B21A8; padding: 12px; text-align: center;">
    <h3 style="margin: 0 0 10px 0; font-family: 'Press Start 2P', monospace; color: #6B21A8; font-size: 12px;">MONANIMAL SHOWCASE</h3>
    
    <div id="showcase" style="position: relative; height: 160px; overflow: hidden; background: #ffffff;">
            <img id="showcase-img" src="" style="width: 100%; height: 100%; object-fit: contain; transition: all 0.6s ease;">
        </div>
        
        <div style="margin-top: 8px; font-family: 'Press Start 2P', monospace; font-size: 12px;" id="showcase-name"></div>
        
        <div style="margin-top: 10px; display: flex; justify-content: center; gap: 15px;">
            <button onclick="prevMon()" style="background: #6B21A8; color: white; border: none; width: 35px; height: 35px; cursor: pointer; font-size: 16px;">←</button>
            <button onclick="nextMon()" style="background: #6B21A8; color: white; border: none; width: 35px; height: 35px; cursor: pointer; font-size: 16px;">→</button>
        </div>
    </div>
</div>

    <!-- Central Banner -->
    <div class="central-banner">
        <h2>WELCOME TO MONEX</h2>
        <p style="font-size: 18px; margin: 20px 0;">Catch. Train. Battle.</p>
        <img src="for result banner/homepagebackground.jpg" 
             style="max-width: 100%; border: 4px solid #6B21A8; margin: 15px 0;">
    </div>

    <!-- Right Sidebar -->
    <div class="right-sidebar">
        <div class="side-box">
            <h2 style="margin-top:0;">NEWBIE GUIDE</h2>
            <p>How to start playing MonEx</p>
        </div>
        <div class="side-box">
            <h2 style="margin-top:0;">SERVER STATUS</h2>
            <div id="server-status" style="font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 10px;">
                <span id="status-dot" style="display: inline-block; width: 12px; height: 12px; background: #22c55e; border-radius: 50%; animation: blink 1.5s infinite;"></span>
                <span id="status-text" style="color: #22c55e;">Online</span>
            </div>
        </div>
        <div class="side-box">
            <h2>DAILY LOGIN</h2>
            <p>Claim your daily reward!</p>
        </div>
    </div>
</div>

<!-- X Wild Log — full width under all 3 columns -->
<div class="wild-log-section">
    <div class="wild-log-header">
        <div>
            <h2><span class="activity-live"></span>X WILD LOG</h2>
            <p class="wild-log-sub">Live catches from X — tweet <b>@monexmonad catch 10 monanimals</b></p>
        </div>
        <p class="wild-log-sub" id="wild-log-status">Loading…</p>
    </div>
    <div class="wild-log-table-wrap" id="x-activity-feed">
        <p class="wild-log-empty">Loading activity…</p>
    </div>
    <div class="wild-log-pagination" id="wild-log-pagination"></div>
</div>

</div>

<script>
// Monanimal Showcase
const monanimals = [
    {name: "Chog", path: "128x128/chog.gif"},
    {name: "Mopo", path: "128x128/mopo.gif"},
    {name: "Molandak", path: "128x128/molandak.gif"},
    {name: "Monavara", path: "128x128/monavara.png"},
    {name: "Moxy", path: "128x128/moxy.png"}
];

let currentIndex = 0;
let autoPlayInterval;

function updateShowcase() {
    const img = document.getElementById("showcase-img");
    const nameEl = document.getElementById("showcase-name");
    img.src = monanimals[currentIndex].path;
    nameEl.textContent = monanimals[currentIndex].name;
}

function nextMon() {
    currentIndex = (currentIndex + 1) % monanimals.length;
    updateShowcase();
}

function prevMon() {
    currentIndex = (currentIndex - 1 + monanimals.length) % monanimals.length;
    updateShowcase();
}

function startAutoPlay() {
    autoPlayInterval = setInterval(nextMon, 3500);
}

updateShowcase();
startAutoPlay();
</script>
<script>
// Dynamic Header Logic
function updateHeader() {
    const nav = document.getElementById("nav-buttons");
    const currentUser = localStorage.getItem("monex_current_user");

    if (!currentUser) {
        // Logged Out - Show Login with X
        nav.innerHTML = `
            <button onclick="mockXLogin()" style="
                padding: 12px 28px;
                background: linear-gradient(145deg, #1DA1F2, #0A7CC2);
                color: white;
                border: none;
                font-weight: bold;
                font-size: 14px;
                cursor: pointer;
                border-radius: 4px;
                box-shadow: 0 4px 12px rgba(29, 161, 242, 0.4);
            ">
                LOGIN WITH X
            </button>
        `;
    } else {
        // Logged In - Show normal nav
        nav.innerHTML = `
            <button class="nav-btn" onclick="goToProfile()">PROFILE</button>
            <button class="nav-btn" onclick="logout()">LOGOUT</button>
        `;
    }
}

// Mock X Login Flow - Stay on Home after login
function mockXLogin() {
    const modal = document.createElement("div");
    modal.style.cssText = `
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); display: flex; align-items: center;
        justify-content: center; z-index: 300;
    `;
    modal.innerHTML = `
        <div style="background:white; padding:30px; border:4px solid #6B21A8; text-align:center; min-width:300px;">
            <p style="font-size:16px;">Connecting to X...</p>
            <p style="margin-top:15px; color:#666;">Please wait</p>
        </div>
    `;
    document.body.appendChild(modal);

    setTimeout(() => {
        const username = "Player" + Math.floor(Math.random() * 9999);
        localStorage.setItem("monex_current_user", username);
        modal.remove();
        
        // Stay on homepage after login
        updateHeader();   // Refresh header to show logged-in state
    }, 1800);
}
function handleGameStart() {
    const currentUser = localStorage.getItem("monex_current_user");

    if (!currentUser) {
        // Not logged in
        showCustomModal("Please login first");
        return;
    }

    // Always go to game (Party tab) regardless of party status
    window.location.href = 'monanimal_game.html';
}

function showCustomModal(message) {
    const modal = document.createElement("div");
    modal.style.cssText = `
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); display: flex; align-items: center;
        justify-content: center; z-index: 300;
    `;
    modal.innerHTML = `
        <div style="background:white; padding:30px; border:4px solid #6B21A8; 
                    box-shadow:4px 4px 0px #6B21A8; text-align:center; min-width:320px;">
            <p style="font-size:16px; margin-bottom:25px;">${message}</p>
            <button onclick="this.parentElement.parentElement.remove()" 
                    style="padding:10px 30px; background:#6B21A8; color:white; border:none; cursor:pointer;">
                OK
            </button>
        </div>
    `;
    document.body.appendChild(modal);
}

function goToProfile() {
    window.location.href = 'monanimal_game.html#profile';
}

function logout() {
    localStorage.removeItem("monex_current_user");
    window.location.href = 'home.html';   // Force go to home page
}

// Initialize
updateHeader();
</script>
<script src="js/activity-client.js"></script>
<script>
let wildLogPage = 1;

async function refreshHomeActivity(page) {
    if (page) wildLogPage = page;
    const el = document.getElementById("x-activity-feed");
    const pager = document.getElementById("wild-log-pagination");
    const status = document.getElementById("wild-log-status");
    if (!el) return;
    try {
        const data = await fetchGlobalActivity(MonExActivity.PAGE_SIZE, wildLogPage);
        MonExActivity.renderTable(el, data, "No X catches yet. Try: @monexmonad catch 10 monanimals");
        MonExActivity.renderPagination(pager, data, (p) => refreshHomeActivity(p));
        if (status) {
            status.textContent = data.total
                ? `${data.total} total catches · showing ${data.entries.length} on this page`
                : "Waiting for first catch…";
        }
    } catch (e) {
        el.innerHTML = `<p class="wild-log-empty">Activity server offline. Check Railway deploy.</p>`;
        if (pager) pager.innerHTML = "";
        if (status) status.textContent = "Offline";
    }
}

refreshHomeActivity(1);
setInterval(() => refreshHomeActivity(wildLogPage), 8000);

fetch((getMonexApiBase() || "") + "/api/health").then(r => r.ok && r.json()).then(d => {
    if (!d?.ok) return;
    const dot = document.getElementById("status-dot");
    const txt = document.getElementById("status-text");
    if (dot) dot.style.background = "#22c55e";
    if (txt) { txt.textContent = "Online"; txt.style.color = "#22c55e"; }
}).catch(() => {
    const dot = document.getElementById("status-dot");
    const txt = document.getElementById("status-text");
    if (dot) dot.style.background = "#eab308";
    if (txt) { txt.textContent = "Game only"; txt.style.color = "#ca8a04"; }
});
</script>
</body>
</html>
