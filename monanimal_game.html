<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MonEx</title>
    <script>
    (function () {
        var loggedIn = !!localStorage.getItem("monex_session_token");
        var entered = !!sessionStorage.getItem("monex_game_entry");
        var dest = (loggedIn && entered) ? "/play/" + location.search + location.hash : "/";
        location.replace(dest);
    })();
    </script>
</head>
<body>
    <p>Redirecting…</p>
</body>
</html>
