<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<title>MonEx</title>
<style>
:root {
    --purple: #6B21A8;
    --purple-light: #A855F7;
}

body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: #f8f8f8;
    color: #111;
}

/* Header */
.header {
    background: white;
    padding: 15px 0;
    border-bottom: none;
}
.header-inner {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.logo {
    font-size: 28px;
    font-weight: 700;
    color: var(--purple);
}
.nav-buttons {
    display: flex;
    gap: 8px;
}
.nav-btn {
    padding: 8px 18px;
    border: none;
    background: white;
    color: #111;
    font-weight: 600;
    cursor: pointer;
    border-radius: 0;
}
.nav-btn:hover {
    background: #f0f0f0;
}

/* Tabs */
.tab-btn {
    padding: 6px 14px;
    border: 2px solid #6B21A8;
    background: white;
    color: #111;
    font-weight: 600;
    cursor: pointer;
    border-radius: 0;
    margin-right: 8px;
    font-family: 'Press Start 2P', cursive;
    font-size: 9px;
}
.tab-btn.active {
    background: transparent;
    color: #111;
    border: 2px solid #111;
    font-weight: 700;
    text-decoration: underline;
    text-underline-offset: 4px;
}

/* Layout */
.container {
    max-width: 1080px;
    margin: 20px auto;
    padding: 0 30px;
}
.trainer-card, .balls-card {
    background: white;
    border: 4px solid var(--purple);
    border-radius: 0;
    padding: 16px;
    margin-bottom: 20px;
    box-shadow: 4px 4px 0px #6B21A8;
}
.party-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}
.box-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
}

/* Mon Cards */
.mon-card {
    background: white;
    border: 4px solid #6a21a6;
    box-shadow: 4px 4px 0px #6a21a6;
    border-radius: 0;
    padding: 14px;
    box-sizing: border-box;
    transition: all 0.2s ease;
    position: relative;
}
.mon-card:hover {
    border-color: #A855F7;
    box-shadow: 0 8px 25px rgba(107, 33, 168, 0.15);
}
.mon-sprite {
    width: 100%;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0;
    margin-bottom: 12px;
    position: relative;
}
.mon-sprite img {
    max-width: 110px;
    max-height: 110px;
    transition: transform 0.3s ease;
}
.mon-card:hover .mon-sprite img {
    transform: scale(1.08);
}
.mon-name {
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    margin: 4px 0 10px;
    color: #181010;
    font-family: 'Press Start 2P', monospace;
    text-transform: uppercase;
}
.type-tags {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
}
.type-tag {
    padding: 3px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: white;
    text-transform: uppercase;
}
.rarity-common { background: #111; }
.rarity-uncommon { background: #16a34a; }
.rarity-rare { background: #2563eb; }
.rarity-legendary { background: #ca8a04; }
.rarity-mythic { background: #9f1239; }

/* Skill Squares */
.skills-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: center;
    margin: 6px 0 8px;
    padding: 0 2px;
}
.skill-square {
    width: 26px;
    height: 26px;
    background: linear-gradient(145deg, #c084fc, #7c3aed);
    border: 2px solid #6b21a8;
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 9px;
    font-weight: 700;
    font-family: 'Press Start 2P', monospace;
    box-shadow: 2px 2px 0px #4c1d95;
    cursor: help;
    position: relative;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    flex-shrink: 0;
}
.skill-square:hover {
    transform: scale(1.2);
    box-shadow: 3px 3px 0px #6b21a8;
    z-index: 10;
}
.skill-square:hover::after {
    content: attr(data-name) " — " attr(data-desc);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    color: #e0e0ff;
    padding: 7px 11px;
    border-radius: 0;
    font-size: 10px;
    font-family: 'Lato', system-ui, sans-serif;
    font-weight: 400;
    white-space: normal;
    width: max-content;
    max-width: 240px;
    text-align: left;
    line-height: 1.35;
    box-shadow: 3px 3px 0px #6b21a8;
    border: 2px solid #6b21a8;
    z-index: 999;
    pointer-events: none;
}
.mon-stats {
    font-size: 13px;
    padding: 0 4px;
}
.stat-row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
    color: #ccc;
}
.stat-row span:first-child {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.25px;
    color: #181010;
}
.stat-row span:last-child {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    font-size: 13px;
    color: #181010;
}

/* XP Bar */
.xp-bar {
    position: relative;
    height: 20px;
    background: #2a2a2a;
    border-radius: 0;
    overflow: hidden;
    margin: 10px 2px 8px;
    border: 1px solid #3a3a3a;
}
.xp-fill {
    height: 100%;
    background: linear-gradient(90deg, #6B21A8, #C084FC);
    transition: width 0.3s ease;
}
.xp-text {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10.5px;
    font-weight: 600;
    color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}

.currently-text {
    font-size: 12px;
    color: #666;
    text-align: center;
    margin: 8px 0;
}

/* Action Buttons */
.mon-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
}
.mon-actions button {
    flex: 1;
    padding: 8px;
    border: none;
    background: #f0f0f0;
    color: #111;
    font-weight: 600;
    cursor: pointer;
    border-radius: 0;
    box-shadow: 2px 2px 3px #d1d1d1;
    font-family: "Press Start 2P", sans-serif;
    font-size: 8px;
}
.mon-actions button.red {
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 0;
    box-shadow: 2px 2px 3px #b91c1c;
    font-family: "Press Start 2P", sans-serif;
    font-size: 8px;
}
.mon-actions button.green {
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 0;
    box-shadow: 2px 2px 3px #16a34a;
    font-family: "Press Start 2P", sans-serif;
    font-size: 8px;
}
.mon-actions button:hover {
    filter: brightness(1.1);
}

/* FEED button */
button.green {
    background: #16a34a;
    color: white;
    border: none;
    padding: 9px;
    border-radius: 0;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 2px 2px 3px #16a34a;
    font-family: "Press Start 2P", sans-serif;
    font-size: 8px;
    transition: all 0.2s ease;
}
button.green:hover {
    background: #15803d;
}

/* Hover symbol */
button:hover::before,
.tab-btn:hover::before,
.mon-actions button:hover::before {
    content: "▸";
    position: absolute;
    left: -11px;
    top: 40%;
    transform: translateY(-50%);
    color: #6B21A8;
    font-size: 40px;
    pointer-events: none;
}
button,
.tab-btn,
.mon-actions button {
    position: relative;
    font-family: "Press Start 2P", sans-serif;
}

/* Battle hover */
#battle-content button:hover {
    background: #6B21A8 !important;
    color: white !important;
    border-color: #6B21A8 !important;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(107, 33, 168, 0.4);
    transition: all 0.2s ease;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    z-index: 100;
}
.modal-content {
    background: white;
    border: 2px solid var(--purple);
    border-radius: 0;
    padding: 24px;
    width: 90%;
    max-width: 420px;
}
.tab-content {
    display: none;
}
.tab-content.active {
    display: block;
}

/* ===== Card stat extras ===== */
.ult-badge {
    margin-top: 6px;
    font-size: 11px;
    text-align: center;
    background: #6B21A8;
    color: white;
    padding: 4px;
    font-weight: bold;
}
.combat-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 10px;
    font-size: 11px;
    margin-top: 8px;
    padding: 6px 8px;
    background: #f3e8ff;
    border: 2px solid #6B21A8;
}
.specialty-badge {
    margin-top: 6px;
    font-size: 10px;
    font-weight: bold;
    color: #6B21A8;
    text-align: center;
    letter-spacing: 0.5px;
}

/* ===== Battle stage ===== */
.battle-stage {
    position: relative;
    width: 100%;
    height: 520px;
    border: 4px solid #6B21A8;
    box-shadow: 4px 4px 0px #6B21A8;
    overflow: hidden;
    background: url('for%20result%20banner/battlebackground.jpg') center/cover no-repeat;
}
.stage-label {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    color: white;
    padding: 4px 14px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    z-index: 5;
}
.fighter-wrap {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 200px;
    z-index: 4;
}
.fighter-wrap.player { left: 7%; bottom: 6%; }
.fighter-wrap.enemy { right: 7%; top: 6%; }
.bsprite {
    width: 150px;
    height: 150px;
    object-fit: contain;
    filter: drop-shadow(0 6px 5px rgba(0,0,0,0.45));
}
.bsprite.mirrored { transform: scaleX(-1); }
.nameplate {
    background: rgba(255,255,255,0.92);
    border: 3px solid #6B21A8;
    padding: 6px 8px;
    width: 190px;
    box-shadow: 2px 2px 0 #6B21A8;
}
.np-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    margin-bottom: 5px;
}
.hpbar { position: relative; height: 15px; background: #333; border: 1px solid #111; }
.hpfill { height: 100%; background: #22c55e; transition: width .4s ease; }
.hptext {
    position: absolute; top: 0; left: 0; width: 100%;
    text-align: center; font-size: 9px; color: white;
    line-height: 15px; text-shadow: 0 0 2px #000;
}
.enbar { height: 6px; background: #222; border: 1px solid #111; margin-top: 4px; }
.enfill { height: 100%; width: 0; background: linear-gradient(90deg, #facc15, #f59e0b); transition: width .3s ease; }
.bench { position: absolute; display: flex; gap: 6px; z-index: 5; }
.bench-enemy { top: 10px; left: 10px; }
.bench-player { bottom: 10px; left: 10px; }
.bench-dot {
    width: 34px; height: 34px;
    border: 2px solid #6B21A8;
    background-color: #fff;
    background-size: cover;
    background-position: center;
    border-radius: 4px;
}
.bench-dot.dead { filter: grayscale(1) brightness(0.5); opacity: 0.5; }
.bench-dot.active { outline: 2px solid #facc15; box-shadow: 0 0 8px #facc15; }
.fx-layer { position: absolute; inset: 0; pointer-events: none; z-index: 6; }
.fx {
    position: absolute;
    transform: translate(-50%, -50%);
    font-size: 64px;
    animation: fxpop .65s ease-out forwards;
}
.fx-ultimate { font-size: 120px; animation: fxpop 1s ease-out forwards; }
@keyframes fxpop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.2) rotate(-15deg); }
    40%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(6deg); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6) rotate(0deg); }
}
.dmgnum {
    position: absolute;
    transform: translate(-50%, -50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 15px;
    font-weight: bold;
    color: #fff;
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
    animation: floatup 1s ease-out forwards;
    white-space: nowrap;
}
.dmgnum.crit  { color: #f59e0b; font-size: 19px; }
.dmgnum.block { color: #cbd5e1; }
.dmgnum.miss  { color: #67e8f9; }
.dmgnum.heal  { color: #22c55e; }
@keyframes floatup {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -170%); }
}
.skill-banner {
    position: absolute;
    top: 40%; left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    opacity: 0;
    background: rgba(107,33,168,0.92);
    color: white;
    padding: 10px 26px;
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    border: 3px solid white;
    white-space: nowrap;
    transition: all .25s ease;
    z-index: 7;
}
.skill-banner.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.skill-banner.ult { background: rgba(220,38,38,0.95); font-size: 17px; box-shadow: 0 0 30px #f59e0b; }
.screen-flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 8; }
.screen-flash.on { animation: flash .35s ease-out; }
@keyframes flash { 0% { opacity: 0; } 30% { opacity: 0.85; } 100% { opacity: 0; } }
.fighter-wrap.hit-shake { animation: shake .3s; }
@keyframes shake {
    0%, 100% { }
    25% { transform: translate(-6px, 0); }
    50% { transform: translate(6px, 0); }
    75% { transform: translate(-4px, 0); }
}
.fighter-wrap.fainted {
    transition: all .5s ease;
    opacity: 0;
    transform: translateY(45px) scale(0.7) !important;
    filter: grayscale(1);
}
</style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <img src="logo.png" alt="MonEx Logo" style="height: 45px; margin-top: 5px;">
    </div>
</div>

<div class="container">
<!-- Trainer -->
<div class="trainer-card">
    <div style="display:flex; align-items:center; justify-content:space-between;">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:60px;height:60px;background:#ddd;border-radius:50%;"></div>
            <div>
                <div id="trainer-name" style="font-weight:700;font-size:18px;"></div>
                <div>Level 12 • 124 wins</div>
            </div>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="nav-btn" onclick="goToProfile()">PROFILE</button>
            <button class="nav-btn" onclick="logout()">LOGOUT</button>
        </div>
    </div>
</div>

<!-- Balls -->
<div class="balls-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
            <strong>MONBALL</strong><br>
            <span id="monball-count">12</span>
        </div>
        <div style="display:flex; gap:8px;">
            <button onclick="buyMonball()" style="padding:8px 16px; border:2px solid #6B21A8; background:white; cursor:pointer;">Buy (500)</button>
            <button onclick="switchTab('shop')" style="padding:8px 16px; border:2px solid #6B21A8; background:white; cursor:pointer;">SHOP</button>
        </div>
    </div>
</div>

<!-- Tabs -->
<div style="margin-bottom:20px;">
    <button class="tab-btn" id="tab-party" onclick="switchTab('party')" style="display: inline-flex; align-items: center; gap: 4px;">
        <img src="animated gif/header tab/party.gif" style="width:15px; height:15px;">
        <span style="margin-top: 5%;">PARTY</span>
    </button>
    <button class="tab-btn" id="tab-box" onclick="switchTab('box')" style="display: inline-flex; align-items: center; gap: 4px;">
        <img src="animated gif/header tab/box.gif" style="width:15px; height:15px;">
        <span style="margin-top: 5%;">BOX</span>
    </button>
    <button class="tab-btn" id="tab-battle" onclick="switchTab('battle')" style="display: inline-flex; align-items: center; gap: 4px;">
        <img src="animated gif/header tab/battle.gif" style="width:15px; height:15px;">
        <span style="margin-top: 4%;">BATTLE</span>
    </button>
    <button class="tab-btn" id="tab-catch" onclick="switchTab('catch')" style="display: inline-flex; align-items: center; gap: 4px;">
        <img src="animated gif/header tab/catch.gif" style="width:15px; height:15px;">
        <span style="margin-top: 3%;">CATCH</span>
    </button>
    <button class="tab-btn" id="tab-inventory" onclick="switchTab('inventory')" style="display: inline-flex; align-items: center; gap: 4px;">
        <span style="margin-top: 5%;">INVENTORY</span>
    </button>
</div>

    <!-- Content -->
    <div id="content-party" class="tab-content active">
        <div class="party-grid" id="party-grid"></div>
    </div>
    <div id="content-box" class="tab-content">
        <div id="box-content" style="min-height:200px;"></div>
    </div>
    <div id="content-battle" class="tab-content">
        <div id="battle-content"></div>
    </div>
    <div id="content-catch" class="tab-content">
        <div id="catch-result" style="margin:15px 0;height:60px;"></div>
        <button onclick="attemptCatch()" style="width:100%;padding:12px;background:#22c55e;color:white;border:1px solid #111;">Throw Monball</button>
    </div>
    <div id="content-inventory" class="tab-content">
    <div style="background: white; border: 4px solid #6B21A8; box-shadow: 4px 4px 0px #6B21A8; padding: 20px;">
        <h2 style="color: #6B21A8; margin-bottom: 20px; text-align: center;">INVENTORY STORAGE</h2>
        
        <div id="inventory-grid" style="
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            gap: 8px; 
            padding: 15px; 
            background: #f8f8f8; 
            border: 3px solid #6B21A8;">
            <!-- Inventory slots will be generated by JS -->
        </div>
    </div>
</div>
</div>

<script>
// =====================================================
// MONEX - CLEAN ORGANIZED STRUCTURE
// Sections: CONSTANTS → HELPERS → STATE → RENDER → ACTIONS → BATTLE → AUTH
// =====================================================

// ==================== CONSTANTS ====================
const MONANIMAL_NAMES = ["Molandak", "Chog", "Mouch", "Salmonad", "Anago", "Larvanad", "Lyraffe", "Mokadal", "Monavara", "Moncock", "Mondigrade", "Montiger", "Mopo", "Mosferatu", "Moxy", "Shramp", "Spidermon", "Moyaki"];

const SPRITE_MAP = {
    "Molandak": "128x128/molandak.png", "Chog": "128x128/chog.png", "Mouch": "128x128/mouch.png",
    "Salmonad": "128x128/salmonad.png", "Anago": "128x128/anago.png", "Larvanad": "128x128/larvanad.png",
    "Lyraffe": "128x128/lyraffe.png", "Mokadal": "128x128/mokadal.png", "Monavara": "128x128/monavara.png",
    "Moncock": "128x128/moncock.png", "Mondigrade": "128x128/mondigrade.png", "Montiger": "128x128/montiger.png",
    "Mopo": "128x128/mopo.png", "Mosferatu": "128x128/mosferatu.png", "Moxy": "128x128/moxy.png",
    "Shramp": "128x128/shramp.png", "Spidermon": "128x128/spidermon.png", "Moyaki": "128x128/moyaki.png"
};

// Normal active skills are RNG-rolled per individual. Each carries a clear
// element so its battle animation always matches its name.
const ACTIVE_SKILL_POOL = [
    {name: "Slash",         element: "physical", type: "active", power: 1.0,  desc: "A swift physical slash."},
    {name: "Flame Burst",   element: "fire",     type: "active", power: 1.15, desc: "Bursts the target in flames."},
    {name: "Aqua Jet",      element: "water",    type: "active", power: 0.95, desc: "A fast jet of water."},
    {name: "Shock Bolt",    element: "electric", type: "active", power: 1.05, desc: "A bolt of lightning."},
    {name: "Rock Throw",    element: "earth",    type: "active", power: 1.2,  desc: "Hurls heavy rocks."},
    {name: "Venom Bite",    element: "poison",   type: "active", power: 1.1,  desc: "A venomous bite."},
    {name: "Frost Shard",   element: "ice",      type: "active", power: 1.0,  desc: "Shards of sharp ice."},
    {name: "Gale Slash",    element: "wind",     type: "active", power: 1.0,  desc: "A crescent of wind."},
    {name: "Shadow Strike", element: "dark",     type: "active", power: 1.1,  desc: "A strike from the shadows."},
    {name: "Psy Beam",      element: "psychic",  type: "active", power: 1.1,  desc: "A focused psychic beam."},
    {name: "Mend",          element: "heal",     type: "heal",   power: 0,    heal: 0.35, desc: "Restores 35% of max HP."},
];

// Passive skills are also RNG-rolled. They apply continuously in battle.
const PASSIVE_SKILL_POOL = [
    {name: "Tough Hide",        element: "passive", type: "passive", dmgTaken: 0.85, desc: "Takes 15% less damage."},
    {name: "Sharp Claws",       element: "passive", type: "passive", dmgDealt: 1.2,  desc: "Deals 20% more damage."},
    {name: "Critical Instinct", element: "passive", type: "passive", critBonus: 10,  desc: "+10% crit chance."},
    {name: "Evasive",           element: "passive", type: "passive", dodgeBonus: 10, desc: "+10% dodge chance."},
    {name: "Bulwark",           element: "passive", type: "passive", blockBonus: 10, desc: "+10% block chance."},
    {name: "Regenerator",       element: "passive", type: "passive", regen: 0.05,    desc: "Heals 5% max HP each turn."},
];

// Per-rarity stat budget. %-stats roll within [pct], SPD within [spd].
const STAT_RANGES = {
    Common:    { pct: [1, 6],  spd: [80, 95]  },
    Uncommon:  { pct: [2, 9],  spd: [85, 105] },
    Rare:      { pct: [3, 13], spd: [90, 115] },
    Legendary: { pct: [5, 18], spd: [100, 130] },
    Mythic:    { pct: [7, 24], spd: [110, 150] },
};

// Each species has its own FIXED ultimate (energy-triggered, fires once per run).
const SPECIES_ULTIMATE = {
    "Molandak":   { name: "Frost Nova",     element: "ice",      power: 2.2 },
    "Chog":       { name: "Croak Quake",    element: "earth",    power: 2.2 },

    "Salmonad":   { name: "Tidal Crash",    element: "water",    power: 2.3 },
    "Anago":      { name: "Abyssal Coil",   element: "water",    power: 2.2 },
    "Larvanad":   { name: "Venom Bloom",    element: "poison",   power: 2.1 },
    "Lyraffe":    { name: "Gale Stampede",  element: "wind",     power: 2.2 },
    "Mokadal":    { name: "Mind Crush",     element: "psychic",  power: 2.3 },
    "Monavara":   { name: "Void Pulse",     element: "dark",     power: 2.3 },
    "Moncock":    { name: "Crimson Spur",   element: "fire",     power: 2.2 },
    "Mondigrade": { name: "Seismic Shell",  element: "earth",    power: 2.4 },

};

// Visual glyph per element (used for the code-generated attack effects).
const ELEMENT_GLYPH = {
    physical: "\u2694\uFE0F", fire: "\uD83D\uDD25", water: "\uD83D\uDCA7",
    electric: "\u26A1", earth: "\uD83E\uDEA8", poison: "\u2620\uFE0F",

// ==================== HELPER FUNCTIONS ====================
function getSpritePath(name) {
    if (name === "Chog" || name === "Mopo" || name === "Anago" || name === "Molandak") {
        return `128x128/${name.toLowerCase()}.gif`;
    }
    return `128x128/${name.toLowerCase()}.png`;
}

function getRarityRoll() {
    const roll = Math.random() * 100;
    if (roll < 0.1) return "Mythic";
    if (roll < 4.1) return "Legendary";
    if (roll < 16.1) return "Rare";
    if (roll < 49.1) return "Uncommon";
    return "Common";
}

function getMaxHP(level, rarity) {
    let baseHP = 80 + (level * 32);
    let rarityBonus = 0;
    if (rarity === "Uncommon") rarityBonus = 15;
    else if (rarity === "Rare") rarityBonus = 35;
    else if (rarity === "Legendary") rarityBonus = 70;
    else if (rarity === "Mythic") rarityBonus = 110;
    return Math.floor(baseHP + rarityBonus);
}

function getAttackDamage(level, rarity) {
    let baseDamage = Math.floor(Math.random() * 13) + 14;
    baseDamage += Math.floor(level * 4.2);
    if (rarity === "Legendary" || rarity === "Mythic") baseDamage += 28;
    else if (rarity === "Rare") baseDamage += 15;
    else if (rarity === "Uncommon") baseDamage += 8;
    return baseDamage;
}

function getXPForNextLevel(level) {
    return Math.floor(100 * Math.pow(1.15, level - 1));
}

function getXPFromBattle(playerLevel, enemyLevel) {
    const diff = enemyLevel - playerLevel;
    let xp = (diff >= 0) ? 25 + (diff * 9) : Math.max(4, 25 + (diff * 5.5));
    const scaling = 1 + (playerLevel / 48);
    return Math.max(3, Math.floor(xp / scaling));
}

function getCatchRate(rarity) {
    return 0.95;   // 95% Catch Rate for all rarities
}

function getRarityClass(rarity) {
    return "rarity-" + rarity.toLowerCase();
}

function getSkillCount(rarity) {
    if (rarity === "Common" || rarity === "Uncommon") return 4;
    if (rarity === "Rare") return 5;
    return 6;
}

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randF(min, max) { return Math.round((Math.random() * (max - min) + min) * 10) / 10; }

// Roll combat stats. Rarity sets the budget; one random "specialty" gets a bonus,
// so two monanimals of the same species/rarity still differ.
function generateStats(rarity) {
    const R = STAT_RANGES[rarity] || STAT_RANGES.Common;
    const s = {
        spd:    randInt(R.spd[0], R.spd[1]),
        crit:   randF(R.pct[0], R.pct[1]),
        dodge:  randF(R.pct[0], R.pct[1]),
        block:  randF(R.pct[0], R.pct[1]),
        hit:    randF(R.pct[0], R.pct[1]),
        pierce: randF(R.pct[0], R.pct[1]),
    };
    const keys = ["spd", "crit", "dodge", "block", "hit", "pierce"];
    const spec = keys[randInt(0, keys.length - 1)];
    if (spec === "spd") s.spd += 25;
    else s[spec] = Math.round((s[spec] + randF(8, 12)) * 10) / 10;
    s.specialty = spec;
    return s;
}

function getSpeciesUltimate(name) {
    return { ...(SPECIES_ULTIMATE[name] || { name: "Power Surge", element: "physical", power: 2.0 }) };
}

// Normal skills (active + passive) are RNG per individual: one passive + the rest actives.
function generateSkills(name, rarity) {
    const count = getSkillCount(rarity);
    const skills = [ { ...PASSIVE_SKILL_POOL[randInt(0, PASSIVE_SKILL_POOL.length - 1)] } ];
    while (skills.length < count) {
        skills.push({ ...ACTIVE_SKILL_POOL[randInt(0, ACTIVE_SKILL_POOL.length - 1)] });
    }
    for (let i = skills.length - 1; i > 0; i--) {
        const j = randInt(0, i);
        [skills[i], skills[j]] = [skills[j], skills[i]];
    }
    return skills;
}

// Backfill any missing data (stats / skills / ultimate / hp) on existing or new monanimals.
function ensureMonReady(mon) {
    if (!mon.max_hp) mon.max_hp = getMaxHP(mon.level, mon.rarity);
    if (mon.current_hp == null) mon.current_hp = mon.max_hp;
    if (!mon.stats || mon.stats.spd == null) mon.stats = generateStats(mon.rarity);
    const expected = getSkillCount(mon.rarity);
    if (!mon.skills || mon.skills.length !== expected || !mon.skills[0] || !mon.skills[0].type) {
        mon.skills = generateSkills(mon.name, mon.rarity);
    }
    if (!mon.ultimate || !mon.ultimate.element) mon.ultimate = getSpeciesUltimate(mon.name);
}

function levelUpMon(mon) {
    const oldMaxHP = mon.max_hp;
    mon.level = Math.floor(mon.level) + 1;
    mon.max_hp = getMaxHP(mon.level, mon.rarity);
    const hpGain = mon.max_hp - oldMaxHP;
    mon.current_hp = Math.min(mon.max_hp, mon.current_hp + hpGain);
}
function passiveBonus(fighter, key) {
    const p = (fighter.skills || []).find(s => s[key] != null);
    return p ? p[key] : 0;
}

function calculateDamage(attacker, defender, skill) {
    let dmg = getAttackDamage(attacker.level, attacker.rarity);
    dmg = Math.floor(dmg * (skill.power || 1));

    const dealt = (attacker.skills || []).find(s => s.dmgDealt);
    if (dealt) dmg = Math.floor(dmg * dealt.dmgDealt);

    const taken = (defender.skills || []).find(s => s.dmgTaken);
    if (taken) dmg = Math.floor(dmg * taken.dmgTaken);

    return Math.max(1, dmg);
}

// ==================== STATE MANAGEMENT ====================
function updateHunger() {
    const now = new Date();
    party.forEach(m => {
        if (m.lastFed) {
            const hours = (now - new Date(m.lastFed)) / 3600000;
            m.hunger = Math.max(10, m.hunger - Math.floor(hours * 8));
        }
    });
}

function checkDailyReset() {
    const now = new Date();
    const utc8 = new Date(now.getTime() + (8 * 60 * 60 * 1000));
    const today = utc8.toISOString().split('T')[0];
    if (lastResetDate !== today) {
        monballs = 15;
        lastResetDate = today;
        saveData();
    }
}

function saveData() {
    if (!currentUser) return;
    localStorage.setItem("monex_" + currentUser, JSON.stringify({ party, box, monballs, money, lastResetDate }));
}

function loadData() {
    if (!currentUser) return;
    const saved = localStorage.getItem("monex_" + currentUser);
    if (saved) {
        const data = JSON.parse(saved);
        party = data.party || [];
        box = data.box || [];
        monballs = data.monballs || 15;
        money = data.money || 5000;
        lastResetDate = data.lastResetDate || null;

        [...party, ...box].forEach(ensureMonReady);
    } else {
        party = [];
        box = [];
        monballs = 15;
        money = 5000;
        lastResetDate = null;
        saveData();
    }
    checkDailyReset();
    updateHunger();
    updateUI();
}

// ==================== ACTIONS ====================
function buyMonball() {
    if (money >= 500) {
        money -= 500;
        monballs++;
        saveData();
        updateUI();
    } else {
        alert("Not enough money!");
    }
}

function feedMon(index) {
    party[index].hunger = 100;
    party[index].lastFed = new Date().toISOString();
    // Feeding also restores HP, so a damaged team can recover between battles
    // (no healing happens during a battle).
    ensureMonReady(party[index]);
    party[index].current_hp = party[index].max_hp;
    saveData();
    updateUI();
}

function toBox(index) {
    if (box.length >= 6) { alert("Box is full!"); return; }
    const mon = party.splice(index, 1)[0];
    box.push(mon);
    saveData();
    updateUI();
}


function releaseMon(index) {
    showConfirmModal("Are you sure you want to release this monanimal?", () => {
        party.splice(index, 1);
        saveData();
        updateUI();
    });
}

function withdrawFromBox(index) {
    if (party.length >= 3) { alert("Party is full!"); return; }
    const mon = box.splice(index, 1)[0];
    party.push(mon);
    saveData();
    updateUI();
    renderBox();
}

// ==================== CATCH ====================
function attemptCatch() {
    if (monballs <= 0) {
        alert("No monballs left! (Resets daily at midnight UTC+8)");
        return;
    }
    monballs--;

    const name = MONANIMAL_NAMES[Math.floor(Math.random() * MONANIMAL_NAMES.length)];
    const rarity = getRarityRoll();
    const catchRate = getCatchRate(rarity);
    const caught = Math.random() < catchRate;
    const result = document.getElementById("catch-result");

    if (caught) {
        const maxHP = getMaxHP(1, rarity);
        const newMon = { 
            name, rarity, level: 1, xp: 0, max_hp: maxHP, current_hp: maxHP,
            hunger: 100, wins: 0, lastFed: new Date().toISOString(),
            stats: generateStats(rarity),
            skills: generateSkills(name, rarity),
            ultimate: getSpeciesUltimate(name)
        };

        if (party.length >= 3) {
            if (box.length >= 6) {
                result.innerHTML = `<span style="color:red">Box is full! Cannot catch.</span>`;
                monballs++;
                saveData();
                updateUI();
                return;
            }
            box.push(newMon);
            result.innerHTML = `<span style="color:green">Caught ${rarity} ${name}! Sent to Box.</span>`;
        } else {
            party.push(newMon);
            result.innerHTML = `<span style="color:green">GOTCHA! Caught ${rarity} ${name}!</span>`;
        }
    } else {
        result.innerHTML = `<span style="color:red">The wild ${name} escaped...</span>`;
    }
    saveData();
    updateUI();
}

function logout() {
    localStorage.removeItem("monex_current_user");
    window.location.href = 'home.html';     // Force stay on home page
}

function checkLogin() {
    const savedUser = localStorage.getItem("monex_current_user");
    if (savedUser) {
        currentUser = savedUser;
        loadData();
        switchTab('party');
    } else {
        // If no user, redirect to home page instead of showing modal
        window.location.href = 'home.html';
    }
}

function switchTab(tab) {
    // Battle protection
    if (isInAdventureBattle && tab !== 'battle') {
        showBattleLeaveWarning(tab);
        return;
    }

    // Normal tab switching
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

    const contentElement = document.getElementById('content-' + tab);
    if (contentElement) {
        contentElement.classList.add('active');
    }

    const tabElement = document.getElementById('tab-' + tab);
    if (tabElement) {
        tabElement.classList.add('active');
    }

    // Call render functions
    if (tab === 'box') renderBox();
    if (tab === 'inventory') renderInventory();

    // Battle tab content
    if (tab === 'battle') {
        const content = document.getElementById("battle-content");
        content.innerHTML = `
            <div style="
                width: 100%; 
                height: 500px; 
                background-image: url('for%20result%20banner/battlebackground.jpg');

                background-position: center;
                position: relative;
                border: 4px solid #6B21A8;
                box-shadow: 4px 4px 0px #6B21A8;
            ">
                <div style="
                    position: absolute; 
                    top: 50%; 
                    left: 50%; 
                    transform: translate(-50%, -50%);

}

    const content = document.getElementById("battle-content");

            width: 100%;

            </button>

function renderTeamArrangement() {
    const container = document.getElementById("team-arrange");
    container.innerHTML = "";
    container.style.display = "flex";
    container.style.gap = "20px";
    container.style.justifyContent = "center";
    container.style.flexWrap = "wrap";

    const currentParty = party.slice(0, 3);

    currentParty.forEach((mon, i) => {
        const div = document.createElement("div");
        div.className = "team-slot";
        div.draggable = true;
        div.dataset.index = i;
        div.style.cssText = `
            border:4px solid #6B21A8; 
            padding:12px; 
            width:190px; 
            background:white; 
            box-shadow:4px 4px 0px #6B21A8; 
            cursor: grab;
            user-select: none;
        `;
        div.innerHTML = `
            <div style="height:140px; display:flex; align-items:center; justify-content:center;">
                <img src="${getSpritePath(mon.name)}" style="max-height:130px; max-width:130px;">
            </div>
            <div style="text-align:center; margin-top:10px;">
                <strong>${mon.name}</strong><br>
                Lv.${Math.floor(mon.level)}
            </div>
        `;

        // Drag events
        div.addEventListener("dragstart", (e) => {
            e.dataTransfer.setData("text/plain", i);
            div.style.opacity = "0.5";
        });

        div.addEventListener("dragend", () => {
            div.style.opacity = "1";
        });

        div.addEventListener("dragover", (e) => {
            e.preventDefault();
        });

        div.addEventListener("drop", (e) => {
            e.preventDefault();
            const fromIndex = parseInt(e.dataTransfer.getData("text/plain"));
            const toIndex = parseInt(div.dataset.index);

            if (fromIndex !== toIndex) {
                // Swap in party array
                [party[fromIndex], party[toIndex]] = [party[toIndex], party[fromIndex]];
                renderTeamArrangement();
            }
        });

        container.appendChild(div);
    });
}

function moveUp(index) {
    if (index <= 0) return;
    [party[index], party[index-1]] = [party[index-1], party[index]];
    renderTeamArrangement();
}

function moveDown(index) {
    if (index >= party.length - 1) return;
    [party[index], party[index+1]] = [party[index+1], party[index]];
    renderTeamArrangement();
}

function startAdventureBattle() {
    if (party.length < 3) {
        alert("You need at least 3 Monanimals in your party!");
        return;
    }

    isInAdventureBattle = true;
    start3v3Battle(party.slice(0, 3));
}
// ==================== BATTLE ENGINE (Phase 1) ====================
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// Build an in-battle fighter. Player fighters reference the real party mon so
// their HP can be written back (it persists after the battle).
function makeFighter(mon, isPlayer) {
    ensureMonReady(mon);
    return {
        ref: isPlayer ? mon : null,
        name: mon.name, rarity: mon.rarity, level: Math.floor(mon.level),
        maxHp: mon.max_hp,
        hp: isPlayer ? Math.max(0, mon.current_hp) : mon.max_hp,
        stats: { ...mon.stats },
        skills: mon.skills.map(s => ({ ...s })),
        ultimate: { ...mon.ultimate },
        sprite: getSpritePath(mon.name),
        energy: 0, ultimateUsed: false, status: [], isPlayer
    };
}

function makeEnemyTeam(playerParty) {
    const baseLevel = Math.floor(playerParty[0].level);
    const team = [];
    for (let i = 0; i < 3; i++) {
        const name = MONANIMAL_NAMES[randInt(0, MONANIMAL_NAMES.length - 1)];
        const rarity = getRarityRoll();
        const level = Math.max(1, baseLevel - 2 + randInt(0, 4));
        const mon = { name, rarity, level, max_hp: getMaxHP(level, rarity) };
        mon.current_hp = mon.max_hp;
        mon.stats = generateStats(rarity);
        mon.skills = generateSkills(name, rarity);
        mon.ultimate = getSpeciesUltimate(name);
        team.push(makeFighter(mon, false));
    }
    return team;
}

function start3v3Battle(playerParty) {
    isInAdventureBattle = true;
    const playerTeam = playerParty.slice(0, 3).map(m => makeFighter(m, true));
    const enemyTeam = makeEnemyTeam(playerParty);
    renderBattleScene();
    runBattle(playerTeam, enemyTeam);
}

function renderBattleScene() {
    const content = document.getElementById("battle-content");
    content.innerHTML = `
        <div class="battle-stage" id="battle-stage">

            <div class="fighter-wrap enemy" id="wrap-enemy">
                <div class="nameplate">
                    <div class="np-row"><span class="np-name" id="np-name-enemy"></span><span class="np-lv" id="np-lv-enemy"></span></div>
                    <div class="hpbar"><div class="hpfill" id="hp-enemy"></div><span class="hptext" id="hptext-enemy"></span></div>
                    <div class="enbar"><div class="enfill" id="en-enemy"></div></div>
                </div>
                <img class="bsprite mirrored" id="sprite-enemy" onerror="this.style.visibility='hidden'">
            </div>
            <div class="fighter-wrap player" id="wrap-player">
                <img class="bsprite" id="sprite-player" onerror="this.style.visibility='hidden'">
                <div class="nameplate">
                    <div class="np-row"><span class="np-name" id="np-name-player"></span><span class="np-lv" id="np-lv-player"></span></div>
                    <div class="hpbar"><div class="hpfill" id="hp-player"></div><span class="hptext" id="hptext-player"></span></div>
                    <div class="enbar"><div class="enfill" id="en-player"></div></div>
                </div>
            </div>
            <div class="fx-layer" id="fx-layer"></div>
            <div class="skill-banner" id="skill-banner"></div>

function setFighter(side, f) {
    const sprite = document.getElementById("sprite-" + side);
    sprite.style.visibility = "visible";
    sprite.src = f.sprite;
    document.getElementById("np-name-" + side).textContent = f.name;
    document.getElementById("np-lv-" + side).textContent = "Lv." + f.level;
    updateBars(side, f);
}

function updateBars(side, f) {
    const pct = Math.max(0, Math.min(100, (f.hp / f.maxHp) * 100));
    const hf = document.getElementById("hp-" + side);
    hf.style.width = pct + "%";
    hf.style.background = pct > 50 ? "#22c55e" : pct > 25 ? "#f59e0b" : "#ef4444";
    document.getElementById("hptext-" + side).textContent = Math.max(0, Math.ceil(f.hp)) + " / " + f.maxHp;
    document.getElementById("en-" + side).style.width = Math.min(100, f.energy) + "%";
}

function renderBench(side, team, curIdx) {
    const el = document.getElementById("bench-" + side);
    el.innerHTML = "";
    team.forEach((f, i) => {
        const d = document.createElement("div");
        d.className = "bench-dot" + (f.hp <= 0 ? " dead" : "") + (i === curIdx ? " active" : "");
        d.style.backgroundImage = `url('${f.sprite}')`;
        el.appendChild(d);
    });
}

function playEffect(side, element, isUltimate) {
    const stage = document.getElementById("battle-stage");
    const sprite = document.getElementById("sprite-" + side);
    const sR = sprite.getBoundingClientRect(), stR = stage.getBoundingClientRect();
    const fx = document.createElement("div");
    fx.className = "fx" + (isUltimate ? " fx-ultimate" : "");
    fx.textContent = ELEMENT_GLYPH[element] || "\uD83D\uDCA5";
    fx.style.left = (sR.left - stR.left + sR.width / 2) + "px";
    fx.style.top = (sR.top - stR.top + sR.height / 2) + "px";
    document.getElementById("fx-layer").appendChild(fx);
    setTimeout(() => fx.remove(), isUltimate ? 1000 : 650);
}

function showDamage(side, amount, kind) {
    const stage = document.getElementById("battle-stage");
    const sprite = document.getElementById("sprite-" + side);
    const sR = sprite.getBoundingClientRect(), stR = stage.getBoundingClientRect();
    const d = document.createElement("div");
    d.className = "dmgnum " + (kind || "");
    if (kind === "miss") d.textContent = "MISS";
    else if (kind === "heal") d.textContent = "+" + amount;
    else d.textContent = "-" + amount + (kind === "crit" ? " CRIT" : kind === "block" ? " BLOCK" : "");
    d.style.left = (sR.left - stR.left + sR.width / 2) + "px";
    d.style.top = (sR.top - stR.top + sR.height / 3) + "px";
    document.getElementById("fx-layer").appendChild(d);
    setTimeout(() => d.remove(), 1000);
}

function showBanner(text, isUlt) {
    const b = document.getElementById("skill-banner");
    b.textContent = text;
    b.className = "skill-banner show" + (isUlt ? " ult" : "");
    setTimeout(() => { b.className = "skill-banner"; }, 900);
}

function screenFlash() {
    const f = document.getElementById("screen-flash");
    f.classList.add("on");
    setTimeout(() => f.classList.remove("on"), 350);
}

async function approach(side) {
    const wrap = document.getElementById("wrap-" + side);
    const dx = side === "player" ? 130 : -130;
    const dy = side === "player" ? -150 : 150;
    wrap.style.transition = "transform .28s ease-in";
    wrap.style.transform = `translate(${dx}px, ${dy}px)`;
    await delay(280);
}

async function recoil(side) {
    const wrap = document.getElementById("wrap-" + side);
    wrap.style.transition = "transform .25s ease-out";
    wrap.style.transform = "translate(0,0)";
    await delay(250);
}

async function faintAnim(side) {
    const wrap = document.getElementById("wrap-" + side);
    wrap.style.transform = "translate(0,0)";
    wrap.classList.add("fainted");
    await delay(550);
}

async function slideIn(side) {
    const wrap = document.getElementById("wrap-" + side);
    wrap.classList.remove("fainted");
    wrap.style.transition = "none";
    wrap.style.transform = side === "player" ? "translate(-240px,130px)" : "translate(240px,-130px)";
    void wrap.offsetWidth;
    wrap.style.transition = "transform .4s ease-out";
    wrap.style.transform = "translate(0,0)";
    await delay(420);
}

function clearStatuses(f) { f.status = []; }

async function takeTurn(atk, def, atkSide, defSide) {
    // Start-of-turn regeneration passive
    const regenP = atk.skills.find(s => s.regen);
    if (regenP && atk.hp > 0) {
        const heal = Math.ceil(atk.maxHp * regenP.regen);
        atk.hp = Math.min(atk.maxHp, atk.hp + heal);
        updateBars(atkSide, atk);
        showDamage(atkSide, heal, "heal");
        await delay(250);
    }

    // Pick a skill: ultimate fires when energy is full and not yet used
    let skill, isUlt = false;
    if (atk.energy >= 100 && !atk.ultimateUsed) {
        skill = atk.ultimate; isUlt = true;
    } else {
        const usable = atk.skills.filter(s => s.type === "active" || s.type === "heal");
        skill = usable.length ? usable[randInt(0, usable.length - 1)]
                              : { name: "Struggle", element: "physical", power: 0.5, type: "active" };
    }

    showBanner((isUlt ? "\u2605 " : "") + skill.name + (isUlt ? " \u2605" : ""), isUlt);
    if (isUlt) screenFlash();
    await delay(isUlt ? 500 : 300);

    const spendEnergy = () => {
        atk.energy = Math.min(100, atk.energy + 30);
        if (isUlt) { atk.ultimateUsed = true; atk.energy = 0; }
    };

    // Healing skill
    if (skill.type === "heal") {
        const heal = Math.ceil(atk.maxHp * (skill.heal || 0.35));
        atk.hp = Math.min(atk.maxHp, atk.hp + heal);
        playEffect(atkSide, "heal", isUlt);
        showDamage(atkSide, heal, "heal");
        spendEnergy();
        updateBars(atkSide, atk);
        await delay(600);
        return;
    }

    // Damage skill: approach, hit, recoil
    await approach(atkSide);
    playEffect(defSide, skill.element, isUlt);

    const effDodge = Math.max(0, Math.min(60, def.stats.dodge + passiveBonus(def, "dodgeBonus") - atk.stats.hit));
    if (Math.random() * 100 < effDodge) {
        showDamage(defSide, 0, "miss");
        spendEnergy();
        updateBars(atkSide, atk);
        await delay(250);
        await recoil(atkSide);
        return;
    }

    let dmg = calculateDamage(atk, def, skill);
    let crit = false, blocked = false;
    if (Math.random() * 100 < (atk.stats.crit + passiveBonus(atk, "critBonus"))) { dmg = Math.floor(dmg * 1.8); crit = true; }
    const effBlock = Math.max(0, Math.min(60, def.stats.block + passiveBonus(def, "blockBonus") - atk.stats.pierce));
    if (Math.random() * 100 < effBlock) { dmg = Math.floor(dmg * 0.5); blocked = true; }
    dmg = Math.max(1, dmg);

    def.hp = Math.max(0, def.hp - dmg);
    const dw = document.getElementById("wrap-" + defSide);
    dw.classList.add("hit-shake");
    setTimeout(() => dw.classList.remove("hit-shake"), 300);
    showDamage(defSide, dmg, crit ? "crit" : blocked ? "block" : "");
    updateBars(defSide, def);

    spendEnergy();
    if (def.hp > 0) def.energy = Math.min(100, def.energy + 15);
    updateBars(atkSide, atk);
    updateBars(defSide, def);

    await delay(250);
    await recoil(atkSide);
    await delay(120);
}

async function runBattle(player, enemy) {
    let pi = 0, ei = 0;
    setFighter("player", player[pi]);
    setFighter("enemy", enemy[ei]);
    renderBench("player", player, pi);
    renderBench("enemy", enemy, ei);
    await delay(700);

    let guard = 0;
    while (guard++ < 500) {
        const P = player[pi], E = enemy[ei];
        const seq = P.stats.spd >= E.stats.spd
            ? [["player", "enemy"], ["enemy", "player"]]
            : [["enemy", "player"], ["player", "enemy"]];

        for (const [atkSide, defSide] of seq) {
            const atk = atkSide === "player" ? P : E;
            const def = defSide === "player" ? P : E;
            if (atk.hp <= 0 || def.hp <= 0) continue;
            await takeTurn(atk, def, atkSide, defSide);
            if (def.hp <= 0) break;
        }

        if (E.hp <= 0) {
            await faintAnim("enemy");
            renderBench("enemy", enemy, ei);
            ei++;
            if (ei >= enemy.length) return endBattle(true, player);
            clearStatuses(P);
            setFighter("enemy", enemy[ei]);
            renderBench("enemy", enemy, ei);
            await slideIn("enemy");
            await delay(250);
        }
        if (P.hp <= 0) {
            await faintAnim("player");
            renderBench("player", player, pi);
            pi++;
            if (pi >= player.length) return endBattle(false, player);
            setFighter("player", player[pi]);
            renderBench("player", player, pi);
            await slideIn("player");
            await delay(250);
        }
        // Persist player HP live (HP carries over; no healing during battle)
        player.forEach(f => { if (f.ref) f.ref.current_hp = Math.max(0, Math.round(f.hp)); });
    }
}

function endBattle(win, player) {
    isInAdventureBattle = false;
    player.forEach(f => { if (f.ref) f.ref.current_hp = Math.max(0, Math.round(f.hp)); });

    let reward = 0;
    if (win) {
        reward = 120 + currentStage * 15;
        money += reward;
        party.slice(0, 3).forEach(m => {
            const xp = getXPFromBattle(Math.floor(m.level), Math.floor(m.level));
            m.xp = (m.xp || 0) + xp;
            m.wins = (m.wins || 0) + 1;
            let need = getXPForNextLevel(Math.floor(m.level));
            while (m.xp >= need) { m.xp -= need; levelUpMon(m); need = getXPForNextLevel(Math.floor(m.level)); }
        });
        currentStage = Math.min(40, currentStage + 1);
        saveAdventureProgress();
    }
    saveData();
    showBattleResult(win, reward);
}

function showBattleResult(win, reward) {
    const content = document.getElementById("battle-content");
    content.innerHTML = `
        <div style="padding:40px; text-align:center; background:white; border:4px solid #6B21A8; box-shadow:4px 4px 0px #6B21A8;">

            <p style="font-size:15px; margin:20px 0;">${win
                ? ('Your team won! Earned ' + reward + ' coins and gained XP.')
                : 'Your team was defeated. Feed/heal your team and try again!'}</p>
            <button onclick="enterAdventureMode()" style="margin-top:10px; padding:14px 45px; background:#6B21A8; color:white; border:none; cursor:pointer; font-family:'Press Start 2P', monospace;">
                CONTINUE
            </button>
        </div>
    `;
    updateUI();
}

        `;

    }
}

// Warning when trying to leave during battle
function showBattleLeaveWarning(targetTab) {
    const modal = document.createElement("div");
    modal.style.cssText = `
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.75); display: flex; align-items: center;
        justify-content: center; z-index: 500;
    `;
    modal.innerHTML = `
        <div style="background:white; padding:30px; border:4px solid #6B21A8; 
                    box-shadow:4px 4px 0px #6B21A8; text-align:center; max-width:420px;">
            <p style="font-size:16px; margin-bottom:25px; line-height:1.5;">
                Leaving the battle now will count as a loss.<br>
                Are you sure you want to leave?
            </p>
            <div style="display:flex; gap:15px; justify-content:center;">
                <button onclick="confirmLeaveBattle('${targetTab}')" 
                        style="padding:12px 28px; background:#ef4444; color:white; border:none; cursor:pointer;">
                    Yes, Leave (Lose)
                </button>
                <button onclick="this.parentElement.parentElement.parentElement.remove()" 
                        style="padding:12px 28px; background:#6B21A8; color:white; border:none; cursor:pointer;">
                    No, Stay in Battle
                </button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

function confirmLeaveBattle(targetTab) {
    isInAdventureBattle = false;
    document.querySelectorAll('div[style*="z-index: 500"]').forEach(m => m.remove());
    switchTab(targetTab);
}
