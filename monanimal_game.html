<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<title>MonEx</title>
<style>
:root {
    --purple: #6B21A8;
    --purple-light: #A855F7;
}

body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: #f8f8f8;
    color: #111;
}

/* Header */
.header {
    background: white;
    padding: 15px 0;
    border-bottom: none;
}
.header-inner {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.logo {
    font-size: 28px;
    font-weight: 700;
    color: var(--purple);
}
.nav-buttons {
    display: flex;
    gap: 8px;
}
.nav-btn {
    padding: 8px 18px;
    border: none;
    background: white;
    color: #111;
    font-weight: 600;
    cursor: pointer;
    border-radius: 0;
}
.nav-btn:hover {
    background: #f0f0f0;
}

/* Tabs */
.tab-btn {
    padding: 6px 14px;
    border: 2px solid #6B21A8;
    background: white;
    color: #111;
    font-weight: 600;
    cursor: pointer;
    border-radius: 0;
    margin-right: 8px;
    font-family: 'Press Start 2P', cursive;
    font-size: 9px;
}
.tab-btn.active {
    background: transparent;
    color: #111;
    border: 2px solid #111;
    font-weight: 700;
    text-decoration: underline;
    text-underline-offset: 4px;
}

/* Layout */
.container {
    max-width: 1080px;
    margin: 20px auto;
    padding: 0 30px;
}
.trainer-card, .balls-card {
    background: white;
    border: 4px solid var(--purple);
    border-radius: 0;
    padding: 16px;
    margin-bottom: 20px;
    box-shadow: 4px 4px 0px #6B21A8;
}
.party-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}
.box-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
}

/* Mon Cards */
.mon-card {
    background: white;
    border: 4px solid #6a21a6;
    box-shadow: 4px 4px 0px #6a21a6;
    border-radius: 0;
    padding: 14px;
    box-sizing: border-box;
    transition: all 0.2s ease;
    position: relative;
}
.mon-card:hover {
    border-color: #A855F7;
    box-shadow: 0 8px 25px rgba(107, 33, 168, 0.15);
}
.mon-sprite {
    width: 100%;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0;
    margin-bottom: 12px;
    position: relative;
}
.mon-sprite img {
    max-width: 110px;
    max-height: 110px;
    transition: transform 0.3s ease;
}
.mon-card:hover .mon-sprite img {
    transform: scale(1.08);
}
.mon-name {
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    margin: 4px 0 10px;
    color: #181010;
    font-family: 'Press Start 2P', monospace;
    text-transform: uppercase;
}
.type-tags {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
}
.type-tag {
    padding: 3px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: white;
    text-transform: uppercase;
}
.rarity-common { background: #111; }
.rarity-uncommon { background: #16a34a; }
.rarity-rare { background: #2563eb; }
.rarity-legendary { background: #ca8a04; }
.rarity-mythic { background: #9f1239; }

/* Skill Squares */
.skills-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: center;
    margin: 6px 0 8px;
    padding: 0 2px;
}
.skill-square {
    width: 26px;
    height: 26px;
    background: linear-gradient(145deg, #c084fc, #7c3aed);
    border: 2px solid #6b21a8;
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 9px;
    font-weight: 700;
    font-family: 'Press Start 2P', monospace;
    box-shadow: 2px 2px 0px #4c1d95;
    cursor: help;
    position: relative;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    flex-shrink: 0;
}
.skill-square:hover {
    transform: scale(1.2);
    box-shadow: 3px 3px 0px #6b21a8;
    z-index: 10;
}
.skill-square:hover::after {
    content: attr(data-name) " — " attr(data-desc);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    color: #e0e0ff;
    padding: 7px 11px;
    border-radius: 0;
    font-size: 10px;
    font-family: 'Lato', system-ui, sans-serif;
    font-weight: 400;
    white-space: normal;
    width: max-content;
    max-width: 240px;
    text-align: left;
    line-height: 1.35;
    box-shadow: 3px 3px 0px #6b21a8;
    border: 2px solid #6b21a8;
    z-index: 999;
    pointer-events: none;
}
.mon-stats {
    font-size: 13px;
    padding: 0 4px;
}
.stat-row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
    color: #ccc;
}
.stat-row span:first-child {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.25px;
    color: #181010;
}
.stat-row span:last-child {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    font-size: 13px;
    color: #181010;
}

/* XP Bar */
.xp-bar {
    position: relative;
    height: 20px;
    background: #2a2a2a;
    border-radius: 0;
    overflow: hidden;
    margin: 10px 2px 8px;
    border: 1px solid #3a3a3a;
}
.xp-fill {
    height: 100%;
    background: linear-gradient(90deg, #6B21A8, #C084FC);
    transition: width 0.3s ease;
}
.xp-text {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10.5px;
    font-weight: 600;
    color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}

.currently-text {
    font-size: 12px;
    color: #666;
    text-align: center;
    margin: 8px 0;
}

/* Action Buttons */
.mon-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
}
.mon-actions button {
    flex: 1;
    padding: 8px;
    border: none;
    background: #f0f0f0;
    color: #111;
    font-weight: 600;
    cursor: pointer;
    border-radius: 0;
    box-shadow: 2px 2px 3px #d1d1d1;
    font-family: "Press Start 2P", sans-serif;
    font-size: 8px;
}
.mon-actions button.red {
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 0;
    box-shadow: 2px 2px 3px #b91c1c;
    font-family: "Press Start 2P", sans-serif;
    font-size: 8px;
}
.mon-actions button.green {
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 0;
    box-shadow: 2px 2px 3px #16a34a;
    font-family: "Press Start 2P", sans-serif;
    font-size: 8px;
}
.mon-actions button:hover {
    filter: brightness(1.1);
}

/* FEED button */
button.green {
    background: #16a34a;
    color: white;
    border: none;
    padding: 9px;
    border-radius: 0;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 2px 2px 3px #16a34a;
    font-family: "Press Start 2P", sans-serif;
    font-size: 8px;
    transition: all 0.2s ease;
}
button.green:hover {
    background: #15803d;
}

/* Hover symbol */
button:hover::before,
.tab-btn:hover::before,
.mon-actions button:hover::before {
    content: "▸";
    position: absolute;
    left: -11px;
    top: 40%;
    transform: translateY(-50%);
    color: #6B21A8;
    font-size: 40px;
    pointer-events: none;
}
button,
.tab-btn,
.mon-actions button {
    position: relative;
    font-family: "Press Start 2P", sans-serif;
}

/* Battle hover */
#battle-content button:hover {
    background: #6B21A8 !important;
    color: white !important;
    border-color: #6B21A8 !important;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(107, 33, 168, 0.4);
    transition: all 0.2s ease;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    z-index: 100;
}
.modal-content {
    background: white;
    border: 2px solid var(--purple);
    border-radius: 0;
    padding: 24px;
    width: 90%;
    max-width: 420px;
}
.tab-content {
    display: none;
}
.tab-content.active {
    display: block;
}
</style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <img src="logo.png" alt="MonEx Logo" style="height: 45px; margin-top: 5px;">
    </div>
</div>

<div class="container">
<!-- Trainer -->
<div class="trainer-card">
    <div style="display:flex; align-items:center; justify-content:space-between;">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:60px;height:60px;background:#ddd;border-radius:50%;"></div>
            <div>
                <div id="trainer-name" style="font-weight:700;font-size:18px;"></div>
                <div>Level 12 • 124 wins</div>
            </div>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="nav-btn" onclick="goToProfile()">PROFILE</button>
            <button class="nav-btn" onclick="logout()">LOGOUT</button>
        </div>
    </div>
</div>

<!-- Balls -->
<div class="balls-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
            <strong>MONBALL</strong><br>
            <span id="monball-count">12</span>
        </div>
        <div style="display:flex; gap:8px;">
            <button onclick="buyMonball()" style="padding:8px 16px; border:2px solid #6B21A8; background:white; cursor:pointer;">Buy (500)</button>
            <button onclick="switchTab('shop')" style="padding:8px 16px; border:2px solid #6B21A8; background:white; cursor:pointer;">SHOP</button>
        </div>
    </div>
</div>

<!-- Tabs -->
<div style="margin-bottom:20px;">
    <button class="tab-btn" id="tab-party" onclick="switchTab('party')" style="display: inline-flex; align-items: center; gap: 4px;">
        <img src="animated gif/header tab/party.gif" style="width:15px; height:15px;">
        <span style="margin-top: 5%;">PARTY</span>
    </button>
    <button class="tab-btn" id="tab-box" onclick="switchTab('box')" style="display: inline-flex; align-items: center; gap: 4px;">
        <img src="animated gif/header tab/box.gif" style="width:15px; height:15px;">
        <span style="margin-top: 5%;">BOX</span>
    </button>
    <button class="tab-btn" id="tab-battle" onclick="switchTab('battle')" style="display: inline-flex; align-items: center; gap: 4px;">
        <img src="animated gif/header tab/battle.gif" style="width:15px; height:15px;">
        <span style="margin-top: 4%;">BATTLE</span>
    </button>
    <button class="tab-btn" id="tab-catch" onclick="switchTab('catch')" style="display: inline-flex; align-items: center; gap: 4px;">
        <img src="animated gif/header tab/catch.gif" style="width:15px; height:15px;">
        <span style="margin-top: 3%;">CATCH</span>
    </button>
    <button class="tab-btn" id="tab-inventory" onclick="switchTab('inventory')" style="display: inline-flex; align-items: center; gap: 4px;">
        <span style="margin-top: 5%;">INVENTORY</span>
    </button>
</div>

    <!-- Content -->
    <div id="content-party" class="tab-content active">
        <div class="party-grid" id="party-grid"></div>
    </div>
    <div id="content-box" class="tab-content">
        <div id="box-content" style="min-height:200px;"></div>
    </div>
    <div id="content-battle" class="tab-content">
        <div id="battle-content"></div>
    </div>
    <div id="content-catch" class="tab-content">
        <div id="catch-result" style="margin:15px 0;height:60px;"></div>
        <button onclick="attemptCatch()" style="width:100%;padding:12px;background:#22c55e;color:white;border:1px solid #111;">Throw Monball</button>
    </div>
    <div id="content-inventory" class="tab-content">
    <div style="background: white; border: 4px solid #6B21A8; box-shadow: 4px 4px 0px #6B21A8; padding: 20px;">
        <h2 style="color: #6B21A8; margin-bottom: 20px; text-align: center;">INVENTORY STORAGE</h2>
        
        <div id="inventory-grid" style="
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            gap: 8px; 
            padding: 15px; 
            background: #f8f8f8; 
            border: 3px solid #6B21A8;">
            <!-- Inventory slots will be generated by JS -->
        </div>
    </div>
</div>
</div>

<script>
// =====================================================
// MONEX - CLEAN ORGANIZED STRUCTURE
// Sections: CONSTANTS → HELPERS → STATE → RENDER → ACTIONS → BATTLE → AUTH
// =====================================================

// ==================== CONSTANTS ====================
const MONANIMAL_NAMES = ["Molandak", "Chog", "Mouch", "Salmonad", "Anago", "Larvanad", "Lyraffe", "Mokadal", "Monavara", "Moncock", "Mondigrade", "Montiger", "Mopo", "Mosferatu", "Moxy", "Shramp", "Spidermon", "Moyaki"];

const SPRITE_MAP = {
    "Molandak": "128x128/molandak.png", "Chog": "128x128/chog.png", "Mouch": "128x128/mouch.png",
    "Salmonad": "128x128/salmonad.png", "Anago": "128x128/anago.png", "Larvanad": "128x128/larvanad.png",
    "Lyraffe": "128x128/lyraffe.png", "Mokadal": "128x128/mokadal.png", "Monavara": "128x128/monavara.png",
    "Moncock": "128x128/moncock.png", "Mondigrade": "128x128/mondigrade.png", "Montiger": "128x128/montiger.png",
    "Mopo": "128x128/mopo.png", "Mosferatu": "128x128/mosferatu.png", "Moxy": "128x128/moxy.png",
    "Shramp": "128x128/shramp.png", "Spidermon": "128x128/spidermon.png", "Moyaki": "128x128/moyaki.png"
};

const ACTIVE_SKILL_POOL = [
    {name: "Power Strike", desc: "Deals strong physical damage.", type: "active", power: 1.0},
    {name: "Swift Dodge", desc: "Quickly evades and counters.", type: "active", power: 0.9},
    {name: "Venom Fang", desc: "Bites with poisonous fangs.", type: "active", power: 1.1},
    {name: "Shock Wave", desc: "Releases an electric shock.", type: "active", power: 1.05},
    {name: "Flame Burst", desc: "Shoots a burst of fire.", type: "active", power: 1.15},
    {name: "Aqua Jet", desc: "Fast water pressure attack.", type: "active", power: 0.95},
    {name: "Rock Throw", desc: "Hurls heavy rocks.", type: "active", power: 1.2},
    {name: "Leaf Blade", desc: "Sharp leaf slash.", type: "active", power: 1.0},
    {name: "Psychic Beam", desc: "Psychic energy beam.", type: "active", power: 1.1},
    {name: "Shadow Sneak", desc: "Surprise shadow attack.", type: "active", power: 1.05},
    {name: "Hyper Fang", desc: "Powerful bite attack.", type: "active", power: 1.25},
];

const PASSIVE_SKILL_POOL = [
    {name: "Tough Hide", desc: "Reduces damage taken by 15%.", type: "passive", power: 0.85},
    {name: "Sharp Claws", desc: "Increases damage dealt by 20%.", type: "passive", power: 1.2},
    {name: "Quick Feet", desc: "Increases attack speed slightly.", type: "passive", power: 1.1},
    {name: "Regenerator", desc: "Recovers a little HP each turn.", type: "passive", power: 1.0},
    {name: "Intimidating Aura", desc: "Lowers enemy damage output.", type: "passive", power: 0.9},
    {name: "Critical Instinct", desc: "Higher chance for strong hits.", type: "passive", power: 1.15},
];

// ==================== STATE ====================
let currentUser = null;
let party = [];
let box = [];
let monballs = 15;
let money = 5000;
let lastResetDate = null;
let isInAdventureBattle = false;

// ==================== HELPER FUNCTIONS ====================
function getSpritePath(name) {
    if (name === "Chog" || name === "Mopo" || name === "Anago" || name === "Molandak") {
        return `128x128/${name.toLowerCase()}.gif`;
    }
    return `128x128/${name.toLowerCase()}.png`;
}

function getRarityRoll() {
    const roll = Math.random() * 100;
    if (roll < 0.1) return "Mythic";
    if (roll < 4.1) return "Legendary";
    if (roll < 16.1) return "Rare";
    if (roll < 49.1) return "Uncommon";
    return "Common";
}

function getMaxHP(level, rarity) {
    let baseHP = 80 + (level * 32);
    let rarityBonus = 0;
    if (rarity === "Uncommon") rarityBonus = 15;
    else if (rarity === "Rare") rarityBonus = 35;
    else if (rarity === "Legendary") rarityBonus = 70;
    else if (rarity === "Mythic") rarityBonus = 110;
    return Math.floor(baseHP + rarityBonus);
}

function getAttackDamage(level, rarity) {
    let baseDamage = Math.floor(Math.random() * 13) + 14;
    baseDamage += Math.floor(level * 4.2);
    if (rarity === "Legendary" || rarity === "Mythic") baseDamage += 28;
    else if (rarity === "Rare") baseDamage += 15;
    else if (rarity === "Uncommon") baseDamage += 8;
    return baseDamage;
}

function getXPForNextLevel(level) {
    return Math.floor(100 * Math.pow(1.15, level - 1));
}

function getXPFromBattle(playerLevel, enemyLevel) {
    const diff = enemyLevel - playerLevel;
    let xp = (diff >= 0) ? 25 + (diff * 9) : Math.max(4, 25 + (diff * 5.5));
    const scaling = 1 + (playerLevel / 48);
    return Math.max(3, Math.floor(xp / scaling));
}

function getCatchRate(rarity) {
    return 0.95;   // 95% Catch Rate for all rarities
}

function getRarityClass(rarity) {
    return "rarity-" + rarity.toLowerCase();
}

function getSkillCount(rarity) {
    if (rarity === "Common" || rarity === "Uncommon") return 4;
    if (rarity === "Rare") return 5;
    return 6;
}

function generateSkills(name, rarity) {
    const count = getSkillCount(rarity);
    const skills = [];
    let seed = 0;
    for (let i = 0; i < name.length; i++) {
        seed += name.charCodeAt(i) * (i + 1);
    }

    let startIdx = seed % ACTIVE_SKILL_POOL.length;
    for (let i = 0; i < count; i++) {
        const idx = (startIdx + i) % ACTIVE_SKILL_POOL.length;
        skills.push({...ACTIVE_SKILL_POOL[idx]});
    }

    if (count >= 4) {
        const passiveIdx = seed % PASSIVE_SKILL_POOL.length;
        skills[3] = {...PASSIVE_SKILL_POOL[passiveIdx]};
    }

    if (skills.length > 0) {
        skills[0].isUltimate = true;
        skills[0].name = `[Ultimate] ${skills[0].name}`;
        skills[0].power = (skills[0].power || 1) * 1.8;
    }

    return skills;
}

function levelUpMon(mon) {
    const oldMaxHP = mon.max_hp;
    mon.level = Math.floor(mon.level) + 1;
    mon.max_hp = getMaxHP(mon.level, mon.rarity);
    const hpGain = mon.max_hp - oldMaxHP;
    mon.current_hp = Math.min(mon.max_hp, mon.current_hp + hpGain);
}
function calculateDamage(mon, skill) {
    let dmg = getAttackDamage(mon.level, mon.rarity);
    dmg = Math.floor(dmg * (skill.power || 1));

    const passive = (mon.skills || []).find(s => s.type === "passive");
    if (passive && passive.power > 1) {
        dmg = Math.floor(dmg * passive.power);
    }
    return dmg;
}

// ==================== STATE MANAGEMENT ====================
function updateHunger() {
    const now = new Date();
    party.forEach(m => {
        if (m.lastFed) {
            const hours = (now - new Date(m.lastFed)) / 3600000;
            m.hunger = Math.max(10, m.hunger - Math.floor(hours * 8));
        }
    });
}

function checkDailyReset() {
    const now = new Date();
    const utc8 = new Date(now.getTime() + (8 * 60 * 60 * 1000));
    const today = utc8.toISOString().split('T')[0];
    if (lastResetDate !== today) {
        monballs = 15;
        lastResetDate = today;
        saveData();
    }
}

function saveData() {
    if (!currentUser) return;
    localStorage.setItem("monex_" + currentUser, JSON.stringify({ party, box, monballs, money, lastResetDate }));
}

function loadData() {
    if (!currentUser) return;
    const saved = localStorage.getItem("monex_" + currentUser);
    if (saved) {
        const data = JSON.parse(saved);
        party = data.party || [];
        box = data.box || [];
        monballs = data.monballs || 15;
        money = data.money || 5000;
        lastResetDate = data.lastResetDate || null;

        [...party, ...box].forEach(mon => {
            if (!mon.max_hp || !mon.current_hp) {
                mon.max_hp = getMaxHP(mon.level, mon.rarity);
                mon.current_hp = mon.max_hp;
            }
            const expected = getSkillCount(mon.rarity);
            const needsRegen = !mon.skills || mon.skills.length !== expected || !mon.skills[0] || !mon.skills[0].type;
            if (needsRegen) {
                mon.skills = generateSkills(mon.name, mon.rarity);
            }
        });
    } else {
        party = [];
        box = [];
        monballs = 15;
        money = 5000;
        lastResetDate = null;
        saveData();
    }
    checkDailyReset();
    updateHunger();
    updateUI();
}

// ==================== UI RENDER ====================
function updateUI() {
    document.getElementById("trainer-name").innerText = currentUser || "Trainer";
    document.getElementById("monball-count").innerText = monballs;

    const grid = document.getElementById("party-grid");
grid.innerHTML = "";

if (party.length === 0) {
    grid.innerHTML = `
        <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #666;">
            <p style="font-size: 18px; margin-bottom: 15px;">Your party is empty</p>
            <p style="font-size: 15px;">Catch some Monanimals first!</p>
        </div>
    `;
} else {
    party.forEach((mon, index) => {
        // ... your existing card creation code stays the same
        if (!mon.max_hp) mon.max_hp = getMaxHP(mon.level, mon.rarity);
        if (!mon.current_hp) mon.current_hp = mon.max_hp;

        const expected = getSkillCount(mon.rarity);
        if (!mon.skills || mon.skills.length !== expected || !mon.skills[0] || !mon.skills[0].type) {
            mon.skills = generateSkills(mon.name, mon.rarity);
        }

        const xpNeeded = getXPForNextLevel(Math.floor(mon.level));
        const currentXP = mon.xp || 0;
        const progress = Math.min(100, Math.floor((currentXP / xpNeeded) * 100));

        const card = document.createElement("div");
        card.className = "mon-card";
        card.style.cursor = "pointer";
        card.innerHTML = `
    <div class="mon-sprite">
        <img src="${getSpritePath(mon.name)}" alt="${mon.name}" style="max-width:110px; max-height:110px;" onerror="this.style.display='none'">
    </div>
    <div class="mon-name">${mon.name}</div>
    <div class="type-tags">
        <span class="type-tag ${getRarityClass(mon.rarity)}">${mon.rarity.toUpperCase()}</span>
    </div>
    <div class="skills-grid">
        ${mon.skills.map(skill => `
            <div class="skill-square" 
                 data-name="${skill.name}" 
                 data-desc="${skill.desc}" 
                 data-type="${skill.type}"
                 title="${skill.type.toUpperCase()}: ${skill.name} — ${skill.desc}">
                <span>${skill.name.substring(0,2).toUpperCase()}</span>
            </div>
        `).join('')}
    </div>
    <div class="mon-stats">
        <div class="xp-bar">
            <div class="xp-fill" style="width: ${progress}%;"></div>
            <div class="xp-text">${currentXP} / ${xpNeeded} XP</div>
        </div>
        <div class="stat-row"><span><strong>LEVEL</strong></span><span>${Math.floor(mon.level)}</span></div>
        <div class="stat-row"><span><strong>HP</strong></span><span>${mon.max_hp}</span></div>
        <div class="stat-row"><span><strong>HUNGER</strong></span><span>${Math.floor(mon.hunger)}%</span></div>
        <div class="stat-row"><span><strong>WINS</strong></span><span>${mon.wins}</span></div>
    </div>
    <div class="currently-text">Currently: ready for battle</div>
    <div class="mon-actions">
        <button onclick="toBox(${index})">TO BOX</button>
        <button onclick="releaseMon(${index})" class="red">RELEASE</button>
    </div>
    <button onclick="feedMon(${index})" class="green" style="width:100%; margin-top:8px; border-radius:0px; box-shadow:2px 2px 3px #16a34a;">FEED</button>
`;
        grid.appendChild(card);
    });
}
    renderBox();
}

function renderBox() {
    const content = document.getElementById("box-content");
    content.innerHTML = "";
    content.style.display = "grid";
    content.style.gridTemplateColumns = "repeat(5, 1fr)";
    content.style.gap = "15px";

    if (!box || box.length === 0) {
        content.innerHTML = `
            <div style="grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: #666;">
                <p style="font-size: 18px; margin-bottom: 15px;">Your box is empty</p>
                <p style="font-size: 15px;">You have no Monanimals stored yet.</p>
            </div>
        `;
        return;
    }

    box.forEach((mon, i) => {
        const xpNeeded = getXPForNextLevel(Math.floor(mon.level));
        const currentXP = mon.xp || 0;
        const progress = Math.min(100, Math.floor((currentXP / xpNeeded) * 100));

        if (!mon.skills || mon.skills.length !== getSkillCount(mon.rarity)) {
            mon.skills = generateSkills(mon.name, mon.rarity);
        }

        const card = document.createElement("div");
        card.className = "mon-card";
        card.innerHTML = `
    <div class="mon-sprite">
        <img src="${getSpritePath(mon.name) || ''}" alt="${mon.name}" style="max-width:96px; max-height:96px;" onerror="this.style.display='none'">
    </div>
    <div class="mon-name">${mon.name}</div>
    <div class="type-tags">
        <span class="type-tag ${getRarityClass(mon.rarity)}">${mon.rarity.toUpperCase()}</span>
    </div>
    <div class="skills-grid">
        ${mon.skills.map(skill => `
            <div class="skill-square" 
                 data-name="${skill.name}" 
                 data-desc="${skill.desc}" 
                 data-type="${skill.type}"
                 title="${skill.type.toUpperCase()}: ${skill.name} — ${skill.desc}">
                <span>${skill.name.substring(0,2).toUpperCase()}</span>
            </div>
        `).join('')}
    </div>
    <div class="mon-stats">
        <div class="xp-bar">
            <div class="xp-fill" style="width: ${progress}%;"></div>
            <div class="xp-text">${currentXP} / ${xpNeeded} XP</div>
        </div>
        <div class="stat-row"><span><strong>LEVEL</strong></span><span>${Math.floor(mon.level)}</span></div>
        <div class="stat-row"><span><strong>HP</strong></span><span>${mon.max_hp}</span></div>
        <div class="stat-row"><span><strong>HUNGER</strong></span><span>${Math.floor(mon.hunger)}%</span></div>
        <div class="stat-row"><span><strong>WINS</strong></span><span>${mon.wins}</span></div>
    </div>
    <div class="mon-actions">
        <button onclick="withdrawFromBox(${i})" class="green">TO PARTY</button>
        <button onclick="releaseFromBox(${i})" class="red">RELEASE</button>
    </div>
`;
        content.appendChild(card);
    });
}

// ==================== ACTIONS ====================
function buyMonball() {
    if (money >= 500) {
        money -= 500;
        monballs++;
        saveData();
        updateUI();
    } else {
        alert("Not enough money!");
    }
}

function feedMon(index) {
    party[index].hunger = 100;
    party[index].lastFed = new Date().toISOString();
    saveData();
    updateUI();
}

function toBox(index) {
    if (box.length >= 6) { alert("Box is full!"); return; }
    const mon = party.splice(index, 1)[0];
    box.push(mon);
    saveData();
    updateUI();
}


function releaseMon(index) {
    showConfirmModal("Are you sure you want to release this monanimal?", () => {
        party.splice(index, 1);
        saveData();
        updateUI();
    });
}

function withdrawFromBox(index) {
    if (party.length >= 3) { alert("Party is full!"); return; }
    const mon = box.splice(index, 1)[0];
    party.push(mon);
    saveData();
    updateUI();
    renderBox();
}
function showConfirmModal(message, onConfirm) {
    const modal = document.createElement("div");
    modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
    `;

    modal.innerHTML = `
        <div style="
            background: white;
            border: 4px solid #6B21A8;
            box-shadow: 4px 4px 0px #6B21A8;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        ">
            <p style="font-size: 16px; margin-bottom: 25px;">${message}</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="confirm-yes" style="
                    padding: 10px 25px;
                    background: #ef4444;
                    color: white;
                    border: none;
                    font-weight: bold;
                    cursor: pointer;
                ">Yes, Release</button>
                
                <button id="confirm-no" style="
                    padding: 10px 25px;
                    background: #f0f0f0;
                    color: #111;
                    border: none;
                    font-weight: bold;
                    cursor: pointer;
                ">Cancel</button>
            </div>
        </div>
    `;

    document.body.appendChild(modal);

    modal.querySelector("#confirm-yes").onclick = () => {
        modal.remove();
        onConfirm();
    };

    modal.querySelector("#confirm-no").onclick = () => {
        modal.remove();
    };
}
function releaseFromBox(index) {
    showConfirmModal("Are you sure you want to release this monanimal?", () => {
        box.splice(index, 1);
        saveData();
        updateUI();
        renderBox();
    });
}

// ==================== CATCH ====================
function attemptCatch() {
    if (monballs <= 0) {
        alert("No monballs left! (Resets daily at midnight UTC+8)");
        return;
    }
    monballs--;

    const name = MONANIMAL_NAMES[Math.floor(Math.random() * MONANIMAL_NAMES.length)];
    const rarity = getRarityRoll();
    const catchRate = getCatchRate(rarity);
    const caught = Math.random() < catchRate;
    const result = document.getElementById("catch-result");

    if (caught) {
        const maxHP = getMaxHP(1, rarity);
        const newMon = { 
            name, rarity, level: 1, xp: 0, max_hp: maxHP, current_hp: maxHP,
            hunger: 100, wins: 0, lastFed: new Date().toISOString(),
            skills: generateSkills(name, rarity)
        };

        if (party.length >= 3) {
            if (box.length >= 6) {
                result.innerHTML = `<span style="color:red">Box is full! Cannot catch.</span>`;
                monballs++;
                saveData();
                updateUI();
                return;
            }
            box.push(newMon);
            result.innerHTML = `<span style="color:green">Caught ${rarity} ${name}! Sent to Box.</span>`;
        } else {
            party.push(newMon);
            result.innerHTML = `<span style="color:green">GOTCHA! Caught ${rarity} ${name}!</span>`;
        }
    } else {
        result.innerHTML = `<span style="color:red">The wild ${name} escaped...</span>`;
    }
    saveData();
    updateUI();
}



// ==================== AUTH & INIT ====================

function logout() {
    localStorage.removeItem("monex_current_user");
    window.location.href = 'home.html';     // Force stay on home page
}

function checkLogin() {
    const savedUser = localStorage.getItem("monex_current_user");
    if (savedUser) {
        currentUser = savedUser;
        loadData();
        switchTab('party');
    } else {
        // If no user, redirect to home page instead of showing modal
        window.location.href = 'home.html';
    }
}

function switchTab(tab) {
    // Battle protection
    if (isInAdventureBattle && tab !== 'battle') {
        showBattleLeaveWarning(tab);
        return;
    }

    // Normal tab switching
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

    const contentElement = document.getElementById('content-' + tab);
    if (contentElement) {
        contentElement.classList.add('active');
    }

    const tabElement = document.getElementById('tab-' + tab);
    if (tabElement) {
        tabElement.classList.add('active');
    }

    // Call render functions
    if (tab === 'box') renderBox();
    if (tab === 'inventory') renderInventory();

    // Battle tab content
    if (tab === 'battle') {
        const content = document.getElementById("battle-content");
        content.innerHTML = `
            <div style="
                width: 100%; 
                height: 500px; 
                background-image: url('for%20result%20banner/battlebackground.jpg'); 
                background-size: cover; 
                background-position: center;
                position: relative;
                border: 4px solid #6B21A8;
                box-shadow: 4px 4px 0px #6B21A8;
            ">
                <div style="
                    position: absolute; 
                    top: 50%; 
                    left: 50%;

                    display: flex;

                    align-items: center;
                ">
                    <button onclick="enterAdventureMode()"

                               background: white; color: #6B21A8; border: 4px solid #6B21A8;">
                        ADVENTURE
                    </button>

                    <button onclick="alert('Arena coming soon!')" 
                        style="padding: 18px 70px; font-size: 18px; font-weight: bold; cursor: pointer; 
                               background: white; color: #6B21A8; border: 4px solid #6B21A8;">
                        ARENA
                    </button>
                    
                    <button onclick="alert('PVP Wager coming soon!')"

                               background: white; color: #6B21A8; border: 4px solid #6B21A8;">

                    </button>
                    
                    <button onclick="alert('Training coming soon!')"

function goToProfile() {
    switchTab('party');
}

// ==================== BOOT ==================== 
document.addEventListener("keydown", function(e) {
    const loginModal = document.getElementById("login-modal");
    if (e.key === "Enter" && loginModal && loginModal.style.display === "flex") {
        login();
    }
});

window.onload = function() {
    checkLogin();
};
// ==================== ADVENTURE MODE ====================
let currentStage = 1;

function loadAdventureProgress() {
    const saved = localStorage.getItem("monex_current_stage");
    if (saved) currentStage = parseInt(saved);
}

function saveAdventureProgress() {
    localStorage.setItem("monex_current_stage", currentStage);
}

function enterAdventureMode() {
    loadAdventureProgress();
    
    const content = document.getElementById("battle-content");
    content.innerHTML = `
        <div style="
            width: 100%; 
            height: 520px; 
            background: url('for%20result%20banner/map1.gif') center/cover no-repeat;
            border: 4px solid #6B21A8;
            box-shadow: 4px 4px 0px #6B21A8;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        ">
            <div style="text-align: center; background: rgba(255,255,255,0.95); padding: 40px 60px; border: 4px solid #6B21A8; box-shadow: 4px 4px 0px #6B21A8;">
                <h2 style="margin: 0 0 25px 0; color: #6B21A8;">ADVENTURE</h2>
                <button id="current-stage-btn" onclick="startStageSelection()" 
                    style="font-size: 26px; padding: 22px 70px; background: #6B21A8; color: white; border: none; cursor: pointer; font-family: 'Press Start 2P', monospace;">
                    CHAPTER 1-${currentStage}
                </button>
            </div>
        </div>
    `;
}

function startStageSelection() {
    const content = document.getElementById("battle-content");
    content.innerHTML = `
        <div style="padding:30px; text-align:center; background:white; border:4px solid #6B21A8; box-shadow:4px 4px 0px #6B21A8;">
            <h2>CHAPTER 1 - STAGE ${currentStage}</h2>
            <p style="margin:20px 0 30px 0; font-size:15px; color:#444;">Arrange sequence before battle start, drag and drop</p>
            
            <div id="team-arrange" style="display:flex; gap:20px; justify-content:center; margin:30px 0; flex-wrap:wrap;"></div>
            
            <button onclick="startAdventureBattle()" style="padding:18px 80px; font-size:20px; background:#6B21A8; color:white; border:none; cursor:pointer; font-family:'Press Start 2P';">
                START BATTLE
            </button>
        </div>
    `;

    renderTeamArrangement();
}

function renderTeamArrangement() {
    const container = document.getElementById("team-arrange");
    container.innerHTML = "";
    container.style.display = "flex";
    container.style.gap = "20px";
    container.style.justifyContent = "center";
    container.style.flexWrap = "wrap";

    const currentParty = party.slice(0, 3);

    currentParty.forEach((mon, i) => {
        const div = document.createElement("div");
        div.className = "team-slot";
        div.draggable = true;
        div.dataset.index = i;
        div.style.cssText = `
            border:4px solid #6B21A8; 
            padding:12px; 
            width:190px; 
            background:white; 
            box-shadow:4px 4px 0px #6B21A8; 
            cursor: grab;
            user-select: none;
        `;
        div.innerHTML = `
            <div style="height:140px; display:flex; align-items:center; justify-content:center;">
                <img src="${getSpritePath(mon.name)}" style="max-height:130px; max-width:130px;">
            </div>
            <div style="text-align:center; margin-top:10px;">
                <strong>${mon.name}</strong><br>
                Lv.${Math.floor(mon.level)}
            </div>
        `;

        // Drag events
        div.addEventListener("dragstart", (e) => {
            e.dataTransfer.setData("text/plain", i);
            div.style.opacity = "0.5";
        });

        div.addEventListener("dragend", () => {
            div.style.opacity = "1";
        });

        div.addEventListener("dragover", (e) => {
            e.preventDefault();
        });

        div.addEventListener("drop", (e) => {
            e.preventDefault();
            const fromIndex = parseInt(e.dataTransfer.getData("text/plain"));
            const toIndex = parseInt(div.dataset.index);

            if (fromIndex !== toIndex) {
                // Swap in party array
                [party[fromIndex], party[toIndex]] = [party[toIndex], party[fromIndex]];
                renderTeamArrangement();
            }
        });

        container.appendChild(div);
    });
}

function moveUp(index) {
    if (index <= 0) return;
    [party[index], party[index-1]] = [party[index-1], party[index]];
    renderTeamArrangement();
}

function moveDown(index) {
    if (index >= party.length - 1) return;
    [party[index], party[index+1]] = [party[index+1], party[index]];
    renderTeamArrangement();
}

function startAdventureBattle() {
    if (party.length < 3) {
        alert("You need at least 3 Monanimals in your party!");
        return;
    }

    isInAdventureBattle = true;
    start3v3Battle(party.slice(0, 3));
}
// 3v3 Sequential Battle
function start3v3Battle(playerTeam) {
    // Create enemy team
    const enemyTeam = [];
    for (let i = 0; i < 3; i++) {
        const name = MONANIMAL_NAMES[Math.floor(Math.random() * MONANIMAL_NAMES.length)];
        const rarity = getRarityRoll();
        const level = Math.max(1, Math.floor(playerTeam[0].level - 3 + Math.random() * 7));
        enemyTeam.push({
            name: name,
            rarity: rarity,
            level: level,
            max_hp: getMaxHP(level, rarity),
            current_hp: getMaxHP(level, rarity),
            skills: generateSkills(name, rarity)
        });
    }

    let playerIndex = 0;
    let enemyIndex = 0;
    let playerHp = playerTeam[playerIndex].current_hp || playerTeam[playerIndex].max_hp;
    let enemyHp = enemyTeam[enemyIndex].current_hp || enemyTeam[enemyIndex].max_hp;

    // Battle UI
    const content = document.getElementById("battle-content");
    content.innerHTML = `
        <div style="padding:20px; text-align:center;">
            <h2>CHAPTER 1 - STAGE ${currentStage}</h2>
            <div id="battle-log" style="background:#111; color:#0f0; padding:15px; height:260px; overflow-y:auto; text-align:left; margin:15px 0; font-family:monospace;"></div>
            
            <div style="display:flex; justify-content:space-around; margin:20px 0;">
                <div>
                    <strong>${playerTeam[playerIndex].name} (P${playerIndex+1})</strong><br>
                    <div id="player-hp" style="height:18px; background:#22c55e; width:280px;"></div>
                </div>
                <div>
                    <strong>${enemyTeam[enemyIndex].name} (E${enemyIndex+1})</strong><br>
                    <div id="enemy-hp" style="height:18px; background:#22c55e; width:280px;"></div>
                </div>
            </div>
        </div>
    `;

    const log = document.getElementById("battle-log");

    function logMsg(msg) {
        log.innerHTML += `<div>${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    // Auto battle loop will be expanded in next update
    logMsg(`Battle Start! ${playerTeam[playerIndex].name} vs ${enemyTeam[enemyIndex].name}`);
    
    // For now, simulate win to test progression
    setTimeout(() => {
        currentStage = Math.min(40, currentStage + 1);
        saveAdventureProgress();
        alert("You won the battle! Progressing to next stage.");
        enterAdventureMode();
    }, 2500);
}
function renderInventory() {
    const grid = document.getElementById("inventory-grid");
    grid.innerHTML = "";

    // Create 40 storage slots (8 columns x 5 rows)
    for (let i = 0; i < 40; i++) {
        const slot = document.createElement("div");
        slot.style.cssText = `
            width: 70px; 
            height: 70px; 
            border: 3px solid #6B21A8; 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 10px; 
            color: #888; 
            box-shadow: 2px 2px 0px #6B21A8;
            position: relative;
        `;
        slot.innerHTML = `
            <span style="font-size: 22px; opacity: 0.3;">📦</span>
        `;
        grid.appendChild(slot);
    }
}
// ==================== BATTLE PROTECTION ====================
// (isInAdventureBattle is declared once in the STATE section above)

// Warning when trying to leave during battle
function showBattleLeaveWarning(targetTab) {
    const modal = document.createElement("div");
    modal.style.cssText = `
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.75); display: flex; align-items: center;
        justify-content: center; z-index: 500;
    `;
    modal.innerHTML = `
        <div style="background:white; padding:30px; border:4px solid #6B21A8; 
                    box-shadow:4px 4px 0px #6B21A8; text-align:center; max-width:420px;">
            <p style="font-size:16px; margin-bottom:25px; line-height:1.5;">
                Leaving the battle now will count as a loss.<br>
                Are you sure you want to leave?
            </p>
            <div style="display:flex; gap:15px; justify-content:center;">
                <button onclick="confirmLeaveBattle('${targetTab}')" 
                        style="padding:12px 28px; background:#ef4444; color:white; border:none; cursor:pointer;">
                    Yes, Leave (Lose)
                </button>
                <button onclick="this.parentElement.parentElement.parentElement.remove()" 
                        style="padding:12px 28px; background:#6B21A8; color:white; border:none; cursor:pointer;">
                    No, Stay in Battle
                </button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

function confirmLeaveBattle(targetTab) {
    isInAdventureBattle = false;
    document.querySelectorAll('div[style*="z-index: 500"]').forEach(m => m.remove());
    switchTab(targetTab);
}
